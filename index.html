<script type="text/babel">
const {useState,useEffect} = React;
const C={bg:"#0a0e1a",surface:"#111827",surfaceAlt:"#1a2235",border:"#1e2d45",accent:"#00d4ff",accentDim:"#0099bb",accentGlow:"rgba(0,212,255,0.12)",green:"#00e5a0",greenDim:"rgba(0,229,160,0.10)",red:"#ff4d6d",redDim:"rgba(255,77,109,0.10)",amber:"#ffb700",amberDim:"rgba(255,183,0,0.10)",text:"#e8f0fe",textMid:"#8899bb",textDim:"#4a5568"};

const FAQS=[
  {q:"What is velocity banking?",a:"Velocity banking is a mortgage payoff strategy where you use a Home Equity Line of Credit (HELOC) as your primary bank account. Every paycheck flows in, reducing the HELOC balance. Every bill flows out. Because your income temporarily reduces the HELOC balance before expenses leave, you pay interest on a lower average daily balance. Then when the HELOC is paid off, you redraw a large lump sum and apply it directly to your mortgage principal — instantly wiping out years of scheduled payments. Repeat until the mortgage is gone."},
  {q:"If my HELOC rate is higher than my mortgage rate, how does this still save money?",a:"This is the most common objection — and it's worth addressing directly. The HELOC balance is never fixed. It drops every single month as your income flows through it. You're paying 7–9% on a rapidly declining number, not a fixed one. Meanwhile, the lump-sum draws onto the mortgage eliminate huge blocks of principal, causing your mortgage interest to collapse. The net effect: total HELOC interest over the entire strategy is often only a few thousand dollars per year, while mortgage interest saved is in the tens of thousands. The math works because you're comparing a small, shrinking HELOC balance against a large, slow-moving mortgage balance."},
  {q:"What is the 'equity draw per cycle' and why does 25% work best?",a:"When your HELOC hits $0 that's a 'cycle.' You then draw new money from your home equity and apply it to the mortgage. The draw percentage controls how much you take. Drawing 100% gives the biggest hit but means carrying a large HELOC balance at 7–9% for a long time. Drawing 25% keeps the HELOC small and manageable so it clears fast, stays cheap, and you still get meaningful mortgage paydown each cycle. At higher mortgage rates (5%+) you can go higher since the gap between rates is smaller."},
  {q:"What is LTV and how does it affect my available credit?",a:"LTV stands for Loan-to-Value. It's your total mortgage debt divided by your home's value. Most lenders cap your combined mortgage + HELOC at 80% LTV. Example: Home worth $500k × 80% = $400k ceiling. If you owe $320k on your mortgage, you can access up to $80k via HELOC. As your mortgage balance drops each month AND as your home appreciates, your available HELOC ceiling grows — which means each cycle you can draw more, accelerating the payoff further."},
  {q:"How does home appreciation affect this strategy?",a:"Home appreciation is a powerful multiplier that most calculators ignore. If your home appreciates at even 3% per year, your available HELOC ceiling grows faster than just from paying down the mortgage. A $500k home appreciating at 3%/yr is worth $522k after 18 months — which adds $17,600 to your 80% LTV ceiling independently of any mortgage paydown. In hot real estate markets (4–6% appreciation), the strategy can accelerate dramatically as growing equity allows larger draws each cycle."},
  {q:"What HELOC fees should I know about?",a:"Key fees to ask lenders about: (1) Origination/closing costs: $0–$500 typically, some lenders waive entirely. (2) Annual fee: $50–$100/year at many banks, sometimes waived for large balances. (3) Early termination fee: Some lenders charge $300–$500 if you close the HELOC within 2–3 years. (4) Inactivity fee: Charged if you don't draw from the line. (5) Draw minimum: Some lenders require minimum draws of $300–$500. Credit unions typically have fewer and lower fees than big banks."},
  {q:"Should I use my HELOC as my actual checking account?",a:"Yes — that's the core mechanic that makes this work. When your paycheck hits the HELOC on the 1st and 15th, your balance drops by $5,000 before expenses leave. That temporary reduction means you're paying interest on a lower average daily balance. Using a credit card for daily purchases (paid from HELOC monthly) maximizes this effect — your income sits in the HELOC longer. This isn't just a gimmick; it meaningfully reduces total HELOC interest over the life of the strategy."},
  {q:"What are the real risks I should know about?",a:"(1) Variable rate risk: HELOCs are variable rate. If Prime rises significantly your HELOC interest increases — model a worst case with a higher rate. (2) Income dependence: If income drops or expenses spike you may struggle to pay down the HELOC. (3) Discipline required: The HELOC is accessible — this requires not spending it on vacations or toys. (4) Home value risk: If values drop your ceiling shrinks and the lender can freeze the line. (5) Draw period: Most HELOCs have a 10-year draw period then convert to repayment-only — ensure your payoff timeline fits within the draw period."},
  {q:"Do I need good credit to open a HELOC?",a:"Most lenders require 620+ credit score, with better rates at 700+. You also typically need: at least 20% equity (80% LTV or better), stable verifiable income, debt-to-income ratio under 43%, and the home to be your primary residence. Shop multiple lenders — especially local credit unions, which often offer better HELOC rates and terms than national banks."},
  {q:"Is HELOC interest tax deductible?",a:"Under current US tax law (post-2017 Tax Cuts and Jobs Act), HELOC interest is only deductible if funds are used to 'buy, build, or substantially improve' the home securing the loan. Using HELOC funds to pay down your mortgage principal likely does not qualify for the deduction. Consult a CPA for your specific situation. Don't count on a deduction when running your numbers."},
  {q:"My mortgage rate is 2.5–4%. Does velocity banking still make sense for me?",a:"This is the most nuanced situation — and it deserves an honest answer. At 2.5–4%, your mortgage rate is below or near what a HELOC will cost you today (8–10%+). That spread matters.\n\nHere's the honest breakdown:\n\n(1) Pure interest savings are modest. At 3.25% vs 8.5% HELOC, you're borrowing at a 5.25% premium every day your HELOC has a balance. The strategy still works mathematically because the HELOC pays down fast and the mortgage principal elimination is large — but the total interest saved vs doing nothing is smaller than it would be at a 6% mortgage.\n\n(2) The liquidity argument is stronger than ever. If you locked your surplus into your mortgage via direct extra payments at 3.25%, that money is gone unless you refinance. With a HELOC at even 8.5%, you're paying roughly $140/month in extra interest on a $20k average balance to keep $100k+ liquid and accessible at all times. For most households, that's a reasonable insurance premium.\n\n(3) The break-even timeline shifts. At low mortgage rates, velocity banking typically breaks even vs doing nothing in years 2–4 rather than year 1. Run the calculator and check the Break-Even tab — if it crosses positive before your target payoff date, the strategy still wins over the full timeline.\n\n(4) The sweet spot shifts lower. At 3.25% mortgage vs 8.5% HELOC, the 10–15% redraw setting often beats the 25% setting on pure interest math. Smaller draws = smaller HELOC balances = less time at the high rate.\n\n(5) Home appreciation may be the deciding factor. If your home is appreciating 4–6%/yr and you're sitting at 3.25% mortgage rate, the HELOC ceiling growth from appreciation alone can fund meaningful draws that wouldn't otherwise be available. This changes the calculus significantly.\n\nBottom line: at 2.5–4% mortgage rates, velocity banking is still a legitimate strategy — but primarily for liquidity and payoff acceleration, not maximum interest savings. Run your numbers, set the redraw slider low (10–15%), and check the comparison tab. If the total interest cost is within $10–20k of doing nothing but pays off 8–12 years faster with full liquidity throughout, many people find that trade worth making."},
];

function simulate(p){
  const{mortgageBal,mortgageRate,mortgagePmt,homeValue,helocRate,monthlyIncome,livingExpenses,monthlyDebts,savings,redrawPct,ltvLimit,appreciationRate,helocFees,remainingYears}=p;
  const ltv=ltvLimit/100;
  const dailyRate=helocRate/100/365;
  const mr=mortgageRate/100/12;
  const ar=appreciationRate/100/12;
  const totalFees=helocFees.origination+(helocFees.annual/12);
  let currentHomeValue=homeValue;
  const maxDraw=Math.max(0,currentHomeValue*ltv-mortgageBal);
  if(maxDraw<5000)return null;
  const initialDraw=maxDraw;
  const savingsApplied=Math.min(savings,initialDraw);
  let mBal=mortgageBal-initialDraw,hBal=initialDraw-savingsApplied;
  let totalMInt=0,totalHInt=0,totalFeesPaid=helocFees.origination,month=0;
  const yearData=[],cycleLog=[{cycle:1,month:0,draw:initialDraw,mortgageAfter:mBal,homeValue:currentHomeValue}];
  let yrMInt=0,yrHInt=0,cycleCount=1;

  // baseline interest (no action) — calculate upfront
  let bMBal=mortgageBal,bMo=0,bMInt=0;
  while(bMBal>0.01&&bMo<600){bMo++;const i=bMBal*mr;bMInt+=i;bMBal=Math.max(0,bMBal+i-mortgagePmt);}
  // running baseline interest for cumulative comparison
  let bMBalR=mortgageBal,bIntSoFar=0;

  function oneMonth(hb,mp,dp){
    let bal=hb+mp+dp,cashBuf=0,interest=0;
    const half=monthlyIncome/2;
    for(let day=1;day<=30;day++){
      if(day===1||day===15){const pay=Math.min(bal,half);bal-=pay;cashBuf+=(half-pay);}
      if(day===25){const fc=Math.min(cashBuf,livingExpenses);cashBuf-=fc;bal+=(livingExpenses-fc);bal=Math.max(0,bal);}
      interest+=Math.max(0,bal)*dailyRate;
    }
    return{endBal:Math.max(0,bal-cashBuf),interest};
  }

  while((mBal>0.01||hBal>0.01)&&month<600){
    month++;
    // home appreciates monthly
    currentHomeValue*=(1+ar);
    const mp=mBal>0?mortgagePmt:0;
    const r=oneMonth(hBal,mp,monthlyDebts);
    totalHInt+=r.interest;yrHInt+=r.interest;hBal=r.endBal;
    // annual HELOC fee
    if(month%12===0){totalFeesPaid+=helocFees.annual;yrHInt+=helocFees.annual;}
    if(mBal>0){const mInt=mBal*mr;totalMInt+=mInt;yrMInt+=mInt;mBal=Math.max(0,mBal+mInt-mp);}
    // baseline tracking
    if(bMBalR>0){const bi=bMBalR*mr;bIntSoFar+=bi;bMBalR=Math.max(0,bMBalR+bi-mortgagePmt);}

    if(hBal<500&&mBal>1000){
      const ceiling=currentHomeValue*ltv-mBal;
      const draw=Math.min(ceiling*redrawPct,mBal);
      if(draw>1000){mBal-=draw;hBal=draw;cycleCount++;cycleLog.push({cycle:cycleCount,month,draw,mortgageAfter:mBal,homeValue:currentHomeValue,ceiling});}
    }
    if(month%12===0){
      const totalPaid=totalMInt+totalHInt+totalFeesPaid;
      const blendedRate=mBal>0?(totalMInt/month*12/((mortgageBal+mBal)/2)*100):0;
      const savedVsNothing=bIntSoFar-totalPaid;
      yearData.push({year:month/12,mBal,hBal,yrMInt,yrHInt,yrTotal:yrMInt+yrHInt,cumTotal:totalPaid,liquidity:Math.max(0,currentHomeValue*ltv-mBal-hBal),homeValue:currentHomeValue,blendedRate,savedVsNothing,hasCycle:cycleLog.some(c=>c.month>0&&Math.floor(c.month/12)+1===month/12)});
      yrMInt=0;yrHInt=0;
    }
  }
  if(month%12!==0){
    yearData.push({year:Math.ceil(month/12),mBal:0,hBal:0,yrMInt,yrHInt,yrTotal:yrMInt+yrHInt,cumTotal:totalMInt+totalHInt+totalFeesPaid,liquidity:currentHomeValue*ltv,partial:true,homeValue:currentHomeValue,blendedRate:0,savedVsNothing:bMInt-(totalMInt+totalHInt+totalFeesPaid),hasCycle:false});
  }

  let dMBal=mortgageBal-savings,dMo=0,dMInt=0;
  const extra=Math.max(0,monthlyIncome-livingExpenses-mortgagePmt-monthlyDebts);
  while(dMBal>0.01&&dMo<600){dMo++;const i=dMBal*mr;dMInt+=i;dMBal=Math.max(0,dMBal+i-Math.min(dMBal+i,mortgagePmt+extra));}

  const totalCost=totalMInt+totalHInt+totalFeesPaid;
  return{months:month,totalMInt,totalHInt,totalFeesPaid,total:totalCost,yearData,cycleLog,cycleCount,initialDraw,maxDraw,savingsApplied,ltvCeiling:currentHomeValue*ltv,baseline:{months:bMo,totalInt:bMInt},direct:{months:dMo,totalInt:dMInt},interestSavedVsBaseline:bMInt-totalCost,extraCostVsDirect:totalCost-dMInt};
}

const fmt=n=>"$"+Math.round(n).toLocaleString();
const fmtD=n=>"$"+Number(n).toFixed(0);
const mo=m=>`${Math.floor(m/12)}y ${m%12}mo`;
const pct=n=>n.toFixed(2)+"%";

function InfoTip({text}){
  return(<span className="tooltip" style={{marginLeft:5,cursor:"help"}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:14,height:14,borderRadius:"50%",background:"#1a2235",border:"1px solid #2a3a55",fontSize:9,color:"#8899bb",fontFamily:"monospace"}}>?</span><span className="tip">{text}</span></span>);
}
function Label({children,tip}){
  return(<div style={{fontSize:11,color:C.textMid,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"monospace",marginBottom:5,display:"flex",alignItems:"center"}}>{children}{tip&&<InfoTip text={tip}/>}</div>);
}
function SliderInput({label,value,min,max,step,onChange,format,hint,tip}){
  const trackRef=React.useRef(null);
  const fillRef=React.useRef(null);
  const thumbRef=React.useRef(null);
  const badgeRef=React.useRef(null);

  const calcValue=clientX=>{
    const rect=trackRef.current.getBoundingClientRect();
    const raw=((clientX-rect.left)/rect.width)*(max-min)+min;
    const stepped=Math.round(raw/step)*step;
    return Math.min(max,Math.max(min,parseFloat(stepped.toFixed(10))));
  };

  const updateDOM=v=>{
    const p=((v-min)/(max-min))*100;
    if(fillRef.current) fillRef.current.style.width=p+"%";
    if(thumbRef.current) thumbRef.current.style.left=p+"%";
    if(badgeRef.current) badgeRef.current.textContent=format(v);
  };

  const onDown=e=>{
    e.preventDefault();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    let lastVal=calcValue(clientX);
    updateDOM(lastVal);
    const onMove=ev=>{
      ev.preventDefault();
      const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
      lastVal=calcValue(cx);
      updateDOM(lastVal);
    };
    const onUp=()=>{
      onChange(lastVal);
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onUp);
    };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove,{passive:false});
    window.addEventListener("touchend",onUp);
  };

  const pct=((value-min)/(max-min))*100;
  return(
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,alignItems:"center"}}>
        <Label tip={tip}>{label}</Label>
        <span ref={badgeRef} style={{fontSize:13,color:"#00d4ff",fontFamily:"monospace",fontWeight:700,background:"rgba(0,212,255,0.08)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:5,padding:"2px 7px"}}>{format(value)}</span>
      </div>
      <div ref={trackRef} onMouseDown={onDown} onTouchStart={onDown}
        style={{position:"relative",height:24,cursor:"grab",userSelect:"none"}}>
        <div style={{position:"absolute",top:"50%",left:0,right:0,height:4,borderRadius:2,background:"#1e2d45",transform:"translateY(-50%)"}}/>
        <div ref={fillRef} style={{position:"absolute",top:"50%",left:0,width:pct+"%",height:4,borderRadius:2,background:"#00d4ff",transform:"translateY(-50%)"}}/>
        <div ref={thumbRef} style={{position:"absolute",top:"50%",left:pct+"%",width:18,height:18,borderRadius:"50%",background:"#00d4ff",transform:"translate(-50%,-50%)",boxShadow:"0 0 0 4px rgba(0,212,255,0.25)",pointerEvents:"none"}}/>
      </div>
      {hint&&<div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        <span style={{fontSize:9,color:"#4a5568",fontFamily:"monospace"}}>{format(min)}</span>
        <span style={{fontSize:9,color:"#4a5568",fontFamily:"monospace"}}>{hint}</span>
        <span style={{fontSize:9,color:"#4a5568",fontFamily:"monospace"}}>{format(max)}</span>
      </div>}
    </div>
  );
}
function useNumberInput(value,onChange){
  const[raw,setRaw]=useState(value===0?"":String(value));
  // Only sync from parent when it's a programmatic change (not user typing)
  const isFocused=React.useRef(false);
  useEffect(()=>{if(!isFocused.current){setRaw(value===0?"":String(value));}},[value]);
  const handleFocus=()=>{isFocused.current=true;};
  // While typing: only update local display, never call onChange
  const handleChange=e=>{setRaw(e.target.value);};
  // On blur: commit the value to parent
  const handleBlur=e=>{
    isFocused.current=false;
    const n=parseFloat(e.target.value);
    if(isNaN(n)||n<0){setRaw("");onChange(0);}
    else{setRaw(String(n));onChange(n);}
  };
  return{raw,handleFocus,handleChange,handleBlur};
}
function NumInput({label,value,onChange,tip,prefix="$"}){
  const{raw,handleFocus,handleChange,handleBlur}=useNumberInput(value,onChange);
  return(<div style={{marginBottom:14}}><Label tip={tip}>{label}</Label><div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}><span style={{padding:"8px 10px",color:C.textDim,fontFamily:"monospace",fontSize:13,borderRight:`1px solid ${C.border}`}}>{prefix}</span><input type="text" inputMode="decimal" value={raw} onFocus={handleFocus} onChange={handleChange} onBlur={handleBlur} style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"8px 10px",color:C.text,fontFamily:"monospace",fontSize:14}}/></div></div>);
}
function ExpenseRow({label,value,onChange,tip}){
  const{raw,handleFocus,handleChange,handleBlur}=useNumberInput(value,onChange);
  return(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{flex:1,fontSize:12,color:C.textMid,display:"flex",alignItems:"center",gap:4}}>{label}{tip&&<InfoTip text={tip}/>}</div><div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:5,overflow:"hidden",width:110}}><span style={{padding:"5px 7px",color:C.textDim,fontFamily:"monospace",fontSize:12,borderRight:`1px solid ${C.border}`}}>$</span><input type="text" inputMode="decimal" value={raw} onFocus={handleFocus} onChange={handleChange} onBlur={handleBlur} style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"5px 7px",color:C.text,fontFamily:"monospace",fontSize:12,width:60}}/></div></div>);
}
function DollarInput({value,onChange,suffix}){
  const{raw,handleFocus,handleChange,handleBlur}=useNumberInput(value,onChange);
  return(<div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}><span style={{padding:"7px 9px",color:C.textDim,fontFamily:"monospace",fontSize:12,borderRight:`1px solid ${C.border}`}}>$</span><input type="text" inputMode="decimal" value={raw} onFocus={handleFocus} onChange={handleChange} onBlur={handleBlur} style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"7px 9px",color:C.text,fontFamily:"monospace",fontSize:13}}/>{suffix&&<span style={{padding:"7px 9px",color:C.textDim,fontFamily:"monospace",fontSize:10,borderLeft:`1px solid ${C.border}`}}>{suffix}</span>}</div>);
}
function Card({label,value,sub,color=C.accent}){
  return(<div style={{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderTop:`2px solid ${color}`,borderRadius:10,padding:"14px 16px"}}><div style={{fontSize:10,color:C.textMid,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"monospace",marginBottom:5}}>{label}</div><div style={{fontSize:20,fontWeight:800,color,fontFamily:"monospace"}}>{value}</div>{sub&&<div style={{fontSize:10,color:C.textDim,marginTop:3,lineHeight:1.4}}>{sub}</div>}</div>);
}
function Tab({label,active,onClick}){
  return(<button onClick={onClick} style={{flex:1,padding:"8px 4px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,letterSpacing:"0.04em",textTransform:"uppercase",background:active?C.accent:"transparent",color:active?C.bg:C.textMid,fontWeight:active?700:400,transition:"all 0.15s"}}>{label}</button>);
}
function Section({title,children,tip}){
  return(<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:18}}><div style={{fontSize:10,color:C.accent,fontFamily:"monospace",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:4}}>// {title}{tip&&<InfoTip text={tip}/>}</div>{children}</div>);
}

function HowItWorks(){
  const steps=[
    {n:"01",title:"Open a HELOC",color:C.accent,desc:"A Home Equity Line of Credit is a revolving credit line secured by your home equity. You only pay interest on what you borrow — and you can pay it down and reborrow as many times as you want during the draw period (typically 10 years). Think of it like a credit card secured by your house, but at a much lower rate."},
    {n:"02",title:"Draw it onto your mortgage",color:C.accent,desc:"On day one, draw the maximum available amount from the HELOC and apply it directly to your mortgage principal. This instantly eliminates a large chunk — and with it, all the future interest that would have accrued on that balance. Your mortgage drops dramatically. Your HELOC balance rises by the same amount."},
    {n:"03",title:"Use HELOC as your checking account",color:C.green,desc:"Direct deposit your entire paycheck into the HELOC. Every dollar of income immediately reduces the HELOC balance. Pay bills from the HELOC. Use a credit card for daily spending, paid from the HELOC monthly. Your balance fluctuates — lower when income arrives, higher when bills leave — but trends down every month."},
    {n:"04",title:"Watch the HELOC pay down",color:C.green,desc:"Because you earn more than you spend, the HELOC balance drops by your monthly surplus every month. Your income does double duty — paying bills AND paying down the line. Interest accrues on the average daily balance, which is always falling. Each month's interest charge is smaller than the last."},
    {n:"05",title:"Redraw and repeat",color:C.amber,desc:"When the HELOC reaches $0, you've completed a cycle. Your mortgage is lower — AND if your home has appreciated, your ceiling is even higher. Draw a new lump sum and slam it onto the mortgage again. Each redraw eliminates another block of principal and all the interest that would have grown on it for the remaining life of the loan."},
    {n:"06",title:"Mortgage paid off years early",color:C.amber,desc:"Repeat the cycles until the mortgage is gone. What might have taken 25+ years takes 5–8 years while your money stayed accessible the entire time. Total interest paid is a fraction of the 30-year schedule. Your HELOC was always available as an emergency fund or investment line throughout."},
  ];

function plainEnglishRow(y,prevY,cycleLog){
  const hasCycle=cycleLog.some(c=>c.month>0&&Math.floor((c.month-1)/12)===y.year-1);
  const mortgageDrop=prevY?prevY.mBal-y.mBal:0;
  const parts=[];
  if(hasCycle)parts.push(`🔄 Redraw cycle — lump sum applied to mortgage`);
  if(y.mBal===0&&prevY&&prevY.mBal>0)parts.push(`🎉 Mortgage fully paid off!`);
  else if(mortgageDrop>15000)parts.push(`Mortgage dropped ${fmt(mortgageDrop)}`);
  if(y.yrHInt>y.yrMInt)parts.push(`HELOC interest exceeded mortgage interest this year`);
  if(y.savedVsNothing>0&&(!prevY||prevY.savedVsNothing<=0))parts.push(`✓ Strategy now ahead of doing nothing`);
  return parts.join(" · ")||"Steady progress — HELOC paying down from monthly surplus";
}

                  {showHelocFees&&(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <NumInput label="Origination / Closing" value={helocOrigination} onChange={setHelocOrigination} tip="One-time fee. $0–$500+ typically. Many credit unions waive entirely."/>
                      <NumInput label="Annual Fee" value={helocAnnual} onChange={setHelocAnnual} tip="Yearly fee to keep the line open. $0–$100 typically."/>
                    </div>
                  )}
                </div>
              </Accordion>

              {/* ── INCOME ── */}
              <Accordion id="income" title="💰 Monthly Income" summary={incomeSummary}>
                <div style={{fontSize:11,color:C.textDim,marginBottom:14,lineHeight:1.5}}>After-tax take-home only. This is what flows into the HELOC on paydays — being accurate here is critical.</div>
                <ExpenseRow label="Primary income (salary / wages)" value={primaryIncome} onChange={setPrimaryIncome} tip="Your main job's monthly take-home after all taxes and deductions."/>
                <ExpenseRow label="Secondary income (spouse / partner)" value={secondaryIncome} onChange={setSecondaryIncome} tip="Second earner's take-home. Zero if single income."/>
                <ExpenseRow label="Other (rental, side, etc.)" value={otherIncome} onChange={setOtherIncome} tip="Rental income, freelance, business distributions. Only reliably recurring amounts."/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,padding:"10px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
                  <span style={{fontSize:11,color:C.textMid,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.06em"}}>Total Monthly Income</span>
                  <span style={{fontSize:17,fontFamily:"monospace",fontWeight:700,color:C.green}}>{fmt(monthlyIncome)}</span>
                </div>
              </Accordion>

              {/* ── EXPENSES ── */}
              <Accordion id="expenses" title="📋 Monthly Expenses" summary={expenseSummary}>
                <div style={{fontSize:11,color:C.textDim,marginBottom:14,lineHeight:1.5}}>Exclude your mortgage. The #1 reason velocity banking fails is an overestimated surplus — use your last 3 months of statements.</div>
                <div style={{display:"flex",background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,overflow:"hidden",marginBottom:14}}>
                  {[["simple","One total"],["detailed","By category"]].map(([v,lbl])=>(
                    <button key={v} onClick={()=>setExpenseMode(v)} style={{flex:1,padding:"8px 0",background:expenseMode===v?C.accent:"transparent",color:expenseMode===v?C.bg:C.textMid,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:11,fontWeight:expenseMode===v?700:400,transition:"all 0.15s"}}>{lbl}</button>
                  ))}
                </div>
                {expenseMode==="simple"?(
                  <div>
                    <ExpenseRow label="Total monthly expenses (excl. mortgage)" value={totalExpensesSimple} onChange={setTotalExpensesSimple} tip="Everything except your mortgage — debt payments, food, utilities, transport, subscriptions, etc."/>
                    <div style={{fontSize:10,color:C.textDim,marginTop:4,lineHeight:1.6}}>Switch to "By category" to make sure nothing is forgotten.</div>
                  </div>
                ):(
                  <div>
                    {expenseGroups.map((group,gi)=>{
                      const groupTotal=group.rows.reduce((s,r)=>s+r.value,0);
                      const isOpen=!!openGroups[group.label];
                      return(
                        <div key={gi} style={{marginBottom:8,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
                          <button onClick={()=>toggleGroup(group.label)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
                            <div style={{width:3,height:14,background:group.color,borderRadius:2,flexShrink:0}}/>
                            <span style={{fontSize:11,color:group.color,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,flex:1}}>{group.label}</span>
                            {group.tip&&<InfoTip text={group.tip}/>}
                            <span style={{fontSize:12,fontFamily:"monospace",color:groupTotal>0?C.textMid:C.textDim,marginRight:8}}>{fmt(groupTotal)}</span>
                            <span style={{fontSize:14,color:C.textDim,fontFamily:"monospace",transform:isOpen?"rotate(0)":"rotate(-90deg)",transition:"transform 0.2s",display:"inline-block"}}>▾</span>
                          </button>
                          {isOpen&&(
                            <div style={{padding:"4px 12px 12px",borderTop:`1px solid ${C.border}`}}>
                              {group.rows.map((row,ri)=>(
                                <ExpenseRow key={ri} label={row.label} value={row.value} onChange={row.set} tip={row.tip}/>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12,marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,color:C.textMid,fontFamily:"monospace"}}>Total non-mortgage expenses</span>
                  <span style={{fontSize:14,fontFamily:"monospace",fontWeight:700,color:C.amber}}>{fmt(livingExpenses)}</span>
                </div>
              </Accordion>

              {/* ── STARTING CAPITAL ── */}
              <Accordion id="savings" title="🏦 Starting Capital" summary={savings>0?fmt(savings):null}>
                <NumInput label="Savings to Deploy Day 1" value={savings} onChange={setSavings} tip="Cash you'll deposit into the HELOC when you open it. Every dollar reduces your starting balance and early interest. It stays accessible — you're not spending it."/>
              </Accordion>

              </>);
            })()}

            {/* SURPLUS SUMMARY */}
            <div style={{background:surplus>0?C.greenDim:C.redDim,border:`1px solid ${surplus>0?C.green+"44":C.red+"44"}`,borderRadius:12,padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontSize:10,color:surplus>0?C.green:C.red,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Monthly Surplus</div>
                  <div style={{fontSize:11,color:C.textDim,lineHeight:1.5}}>This is how fast your HELOC balance drops each month. Higher = faster payoff.</div>
                </div>
                <div style={{fontSize:32,fontFamily:"monospace",fontWeight:800,color:surplus>0?C.green:C.red}}>{fmt(surplus)}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:11,fontFamily:"monospace"}}>
                <div style={{background:"rgba(0,0,0,0.2)",borderRadius:6,padding:"8px 10px"}}>
                  <div style={{color:C.textDim,marginBottom:2}}>Total income</div>
                  <div style={{color:C.green,fontWeight:700}}>{fmt(monthlyIncome)}</div>
                </div>
                <div style={{background:"rgba(0,0,0,0.2)",borderRadius:6,padding:"8px 10px"}}>
                  <div style={{color:C.textDim,marginBottom:2}}>Total outflow</div>
                  <div style={{color:C.amber,fontWeight:700}}>{fmt(totalMonthlyOut)}</div>
                </div>
              </div>
              {surplus<=500&&surplus>0&&<div style={{marginTop:10,fontSize:11,color:C.amber,lineHeight:1.5}}>⚠ Surplus under $500/month. The strategy works but payoff cycles will be long. Consider reducing discretionary expenses first.</div>}
              {surplus<=0&&<div style={{marginTop:10,fontSize:11,color:C.red,lineHeight:1.5}}>⚠ Negative surplus. Velocity banking requires positive monthly cash flow. Adjust income or expenses above until this number is positive.</div>}
            </div>

          </div>

          {/* ── RIGHT COLUMN ── */}
          <div>
            {/* Verdict */}
            <div style={{background:vc.bg,border:`1px solid ${vc.color}44`,borderLeft:`4px solid ${vc.color}`,borderRadius:10,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"flex-start",gap:14}}>
              <span style={{fontSize:30,lineHeight:1,flexShrink:0}}>{vc.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontFamily:"monospace",fontWeight:700,color:vc.color,letterSpacing:"0.1em",marginBottom:4}}>VELOCITY BANKING: {vc.label}</div>
                <div style={{fontSize:12,color:C.textMid,lineHeight:1.6,marginBottom:result?6:0}}>{vc.sub}</div>
                {result&&<div style={{fontSize:11,color:C.textDim,lineHeight:1.5}}>Saves <span style={{color:C.green,fontWeight:700}}>{fmt(result.interestSavedVsBaseline)}</span> vs doing nothing · {result.extraCostVsDirect>0?<span>Costs <span style={{color:C.amber}}>{fmt(result.extraCostVsDirect)}</span> more than locking cash away — but money stays liquid</span>:<span><span style={{color:C.green}}>{fmt(Math.abs(result.extraCostVsDirect))} cheaper</span> than locking cash away AND keeps liquidity</span>}</div>}
              </div>
            </div>

            {result&&<>
              {/* Strategy Settings — under verdict */}
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px",marginBottom:16}}>
                <div style={{fontSize:10,color:C.accent,fontFamily:"monospace",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>// Strategy Settings <InfoTip text="Controls how aggressively you draw equity each cycle. Adjust this after seeing your results — the sweet spot depends on your specific rate spread."/></div>
                <SliderInput label="Equity Drawn Per Cycle" value={redrawPct} min={0.10} max={1.0} step={0.05} onChange={setRedrawPct} format={v=>Math.round(v*100)+"%"} tip="When HELOC hits $0, this % of available equity gets drawn onto the mortgage. 25% is the sweet spot for most people — keeps HELOC balances small so interest stays low. At lower mortgage rates, go lower (10–15%). At 6%+ mortgage rates, you can go higher."/>
                <StrategyExplainer redrawPct={redrawPct} surplus={surplus} result={result}/>
              </div>

              {/* Key stat cards */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
                <Card label="Payoff Timeline" value={mo(result.months)} sub={`vs ${mo(result.baseline.months)} doing nothing`} color={C.green}/>
                <Card label="Total Interest + Fees" value={fmt(result.total)} sub={`Mtg: ${fmt(result.totalMInt)} · HELOC: ${fmt(result.totalHInt)}`} color={C.amber}/>
                <Card label="Interest Saved" value={fmt(result.interestSavedVsBaseline)} sub="vs 30yr schedule, no extra payments" color={C.accent}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
                <Card label="HELOC Cycles" value={result.cycleCount} sub={`~${Math.round(result.months/result.cycleCount)} months per cycle`} color={C.textMid}/>
                <Card label="HELOC Ceiling" value={fmt(result.ltvCeiling)} sub={`First draw: ${fmt(result.initialDraw)} onto mortgage`} color={C.textMid}/>
                <Card label="vs Locking Cash Away" value={(result.extraCostVsDirect>0?"+":"")+fmt(result.extraCostVsDirect)} sub={result.extraCostVsDirect>0?"premium for full liquidity":"cheaper + liquidity"} color={result.extraCostVsDirect>0?C.amber:C.green}/>
              </div>

              {/* Payoff Story strip */}
              <div style={{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px",marginBottom:16}}>
                <div style={{fontSize:10,color:C.accent,fontFamily:"monospace",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>// Your Payoff Story</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:0}}>
                  {[
                    {step:"Day 0",color:C.accent,text:`Draw ${fmt(result.initialDraw)} → mortgage drops to ${fmt(mortgageBal-result.initialDraw)}. Deposit ${fmt(result.savingsApplied)} savings → HELOC starts at ${fmt(result.initialDraw-result.savingsApplied)}.`},
                    {step:"Monthly",color:C.green,text:`All income (${fmt(monthlyIncome)}) deposits into HELOC. Bills drawn out. Net paydown: ~${fmt(surplus)}/mo.`},
                    {step:"Interest",color:C.amber,text:`Month 1 HELOC interest: ~${fmt((result.initialDraw-result.savingsApplied)*(helocRate/100/12))}. Drops every month as balance falls.`},
                    {step:"Redraw",color:C.accent,text:`Every ~${Math.round(result.months/result.cycleCount)} months HELOC hits $0. Draw ${Math.round(redrawPct*100)}% of equity onto mortgage. Repeat ${result.cycleCount}×.`},
                    {step:"Payoff",color:C.green,text:`Done in ${mo(result.months)} vs ${mo(result.baseline.months)}. Saved ${fmt(result.interestSavedVsBaseline)}. HELOC open throughout.`},
                  ].map(({step,color,text},i,arr)=>(
                    <div key={step} style={{padding:"0 14px",borderRight:i<arr.length-1?`1px solid ${C.border}`:"none"}}>
                      <div style={{fontSize:9,color,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:5}}>{step}</div>
                      <div style={{fontSize:11,color:C.textMid,lineHeight:1.6}}>{text}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Tabs — fixed-height wrapper prevents layout jolt */}
              <div style={{display:"flex",gap:2,marginBottom:14,background:C.surface,padding:4,borderRadius:8,border:`1px solid ${C.border}`}}>
                {[["year-by-year","Year-by-Year"],["cycles-comparison","Cycles & Comparison"]].map(([t,l])=><Tab key={t} label={l} active={tab===t} onClick={()=>setTab(t)}/>)}
              </div>

              {/* Tab panels — minWidth locks the container to year-by-year table width */}
              <div style={{minWidth:800}}>

                {/* Year-by-Year */}
              <div style={{display:tab==="year-by-year"?"block":"none",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{minWidth:780}}>
                    <thead>
                      <tr style={{background:C.bg}}>
                        {["Year","Mortgage Bal","HELOC Bal","Yr Mtg Int","Yr HELOC Int","Blended Rate","Saved vs Nothing","Liquidity","Notes"].map(h=>(
                          <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:9,color:C.textDim,fontFamily:"monospace",letterSpacing:"0.04em",textTransform:"uppercase",fontWeight:400,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {result.yearData.map((y,i)=>{
                        const prevY=i>0?result.yearData[i-1]:null;
                        const note=plainEnglishRow(y,prevY,result.cycleLog);
                        const isBreakeven=y.savedVsNothing>0&&(!prevY||prevY.savedVsNothing<=0);
                        return(
                          <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":C.surfaceAlt+"22"}}>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.textMid,whiteSpace:"nowrap"}}>{y.partial?`Yr ${y.year}*`:`Year ${y.year}`}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.text,whiteSpace:"nowrap"}}>{y.mBal>0?fmt(y.mBal):<span style={{color:C.green,fontWeight:700}}>✓ PAID</span>}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.text,whiteSpace:"nowrap"}}>{fmt(y.hBal)}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.amber,whiteSpace:"nowrap"}}>{fmt(y.yrMInt)}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:y.yrHInt>y.yrMInt?C.red:C.accent,whiteSpace:"nowrap"}}>{fmt(y.yrHInt)}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.textMid,whiteSpace:"nowrap"}}>{y.blendedRate>0?y.blendedRate.toFixed(2)+"%":"—"}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:y.savedVsNothing>0?C.green:C.red,fontWeight:isBreakeven?700:400,whiteSpace:"nowrap"}}>{y.savedVsNothing>0?"+":""}{fmt(y.savedVsNothing)}{isBreakeven?" ✓":""}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.green,whiteSpace:"nowrap"}}>{fmt(y.liquidity)}</td>
                            <td style={{padding:"9px 12px",fontSize:11,color:C.textDim,fontStyle:"italic",minWidth:160}}>{note}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{padding:"8px 14px",borderTop:`1px solid ${C.border}`,fontSize:10,color:C.textDim,fontFamily:"monospace",display:"flex",gap:16,flexWrap:"wrap"}}>
                  <span>* Partial year</span>
                  <span style={{color:C.red}}>■ HELOC Int red = exceeds mortgage int that year</span>
                  <span style={{color:C.green}}>■ Saved vs Nothing turns green at break-even</span>
                </div>
              </div>

              {/* Cycles & Comparison — side by side */}
              <div style={{display:tab==="cycles-comparison"?"grid":"none",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>

                {/* Cycles */}
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.textMid,fontFamily:"monospace"}}>{result.cycleCount} total cycle{result.cycleCount>1?"s":""} — each a lump sum onto principal</div>
                  {result.cycleLog.map((c,i)=>(
                    <div key={i} style={{padding:"14px 16px",borderBottom:i<result.cycleLog.length-1?`1px solid ${C.border}`:"none",display:"flex",gap:12,alignItems:"flex-start"}}>
                      <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,background:i===0?C.accentGlow:C.surfaceAlt,border:`2px solid ${i===0?C.accent:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace",fontSize:11,fontWeight:700,color:i===0?C.accent:C.textMid}}>{c.cycle}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,gap:6}}>
                          <span style={{fontFamily:"monospace",fontSize:12,color:C.text,flexShrink:0}}>{c.month===0?"Day 0 — Initial Draw":`Month ${c.month} — Redraw`}</span>
                          <span style={{fontFamily:"monospace",fontSize:13,color:C.accent,fontWeight:700,flexShrink:0}}>{fmt(c.draw)}</span>
                        </div>
                        <div style={{fontSize:11,color:C.textMid,lineHeight:1.6}}>
                          {c.month===0
                            ?`Mortgage → ${fmt(c.mortgageAfter)}. HELOC starts at ${fmt(c.draw-result.savingsApplied)} after ${fmt(result.savingsApplied)} savings.`
                            :`Drew ${Math.round(redrawPct*100)}% of ${fmt(c.ceiling||0)} ceiling. Mortgage → ${fmt(c.mortgageAfter)}.`}
                        </div>
                      </div>
                    </div>
                  ))}
                  <div style={{padding:"10px 16px",background:C.bg,borderTop:`1px solid ${C.border}`,fontSize:10,color:C.textMid,lineHeight:1.5}}>Each redraw eliminates principal that would have accrued interest for years.</div>
                </div>

                {/* Comparison */}
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.textMid,fontFamily:"monospace"}}>Three strategies — same income</div>
                  {[
                    {label:"30yr — No Extra Payments",payoff:mo(result.baseline.months),mInt:result.baseline.totalInt,hInt:0,total:result.baseline.totalInt,liquidity:"Full liquidity, no acceleration",color:C.textMid,note:"Default path. Maximum interest paid.",highlight:false},
                    {label:`Velocity Banking (${Math.round(redrawPct*100)}% redraw)`,payoff:mo(result.months),mInt:result.totalMInt,hInt:result.totalHInt,total:result.total,liquidity:`${fmt(result.ltvCeiling)} line accessible`,color:C.accent,note:"Early payoff + savings + liquidity.",highlight:true},
                    {label:"Direct Extra Payments",payoff:mo(result.direct.months),mInt:result.direct.totalInt,hInt:0,total:result.direct.totalInt,liquidity:"$0 liquid — locked in equity",color:C.amber,note:"Lowest interest, no liquidity.",highlight:false},
                  ].map((s,i)=>(
                    <div key={i} style={{padding:"14px 16px",borderBottom:i<2?`1px solid ${C.border}`:"none",background:s.highlight?C.accentGlow:"transparent",borderLeft:`3px solid ${s.highlight?C.accent:"transparent"}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8,gap:6}}>
                        <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:s.color,lineHeight:1.3}}>{s.label}</span>
                        <span style={{fontFamily:"monospace",fontSize:14,fontWeight:700,color:C.text,flexShrink:0}}>{s.payoff}</span>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                        {[["Mtg Int",fmt(s.mInt),C.amber],["HELOC Int",fmt(s.hInt),s.hInt>0?C.accent:C.textDim],["Total",fmt(s.total),s.color]].map(([lbl,val,col])=>(
                          <div key={lbl} style={{background:C.surfaceAlt,borderRadius:5,padding:"7px 8px"}}>
                            <div style={{fontSize:8,color:C.textDim,fontFamily:"monospace",textTransform:"uppercase",marginBottom:2}}>{lbl}</div>
                            <div style={{fontSize:12,fontFamily:"monospace",color:col,fontWeight:700}}>{val}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:10,color:C.textDim}}>{s.liquidity}</div>
                      <div style={{fontSize:10,color:C.textDim,fontStyle:"italic",marginTop:2}}>{s.note}</div>
                    </div>
                  ))}
                </div>

              </div>

              </div>{/* end tab panels */}
            </>}

            {!result&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:36,textAlign:"center"}}>
              <div style={{fontSize:44,marginBottom:14}}>🏠</div>
              <div style={{color:C.red,fontFamily:"monospace",fontSize:15,marginBottom:12,fontWeight:700}}>INSUFFICIENT EQUITY FOR A HELOC</div>
              <div style={{color:C.textMid,fontSize:13,lineHeight:1.8}}>Your mortgage balance (<strong style={{color:C.text}}>{fmt(mortgageBal)}</strong>) exceeds the {ltvLimit}% LTV ceiling (<strong style={{color:C.text}}>{fmt(homeValue*ltvLimit/100)}</strong>).<br/>You need <strong style={{color:C.amber}}>{fmt(mortgageBal-homeValue*ltvLimit/100)}</strong> more equity to qualify.<br/><br/>Try raising your home value estimate, adjusting the LTV limit, or lowering your mortgage balance to explore future scenarios.</div>
            </div>}
          </div>

        </div>}
      </div>

      {/* FOOTER */}
      <div style={{maxWidth:1200,margin:"32px auto 0",padding:"20px 28px 0",borderTop:`1px solid ${C.border}`}}>
        <p style={{fontSize:10,color:C.textDim,fontFamily:"monospace",textAlign:"center",lineHeight:1.8}}>For educational purposes only. Not financial advice. Consult a licensed financial advisor and your lender before making mortgage decisions.<br/>Assumes {ltvLimit}% LTV HELOC · Income deposited 1st & 15th · CC paid day 25 · {appreciationRate}%/yr home appreciation · Exact daily interest accrual.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
