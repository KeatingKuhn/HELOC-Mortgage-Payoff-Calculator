const {useState,useEffect} = React;
const C={bg:"#0a0e1a",surface:"#111827",surfaceAlt:"#1a2235",border:"#1e2d45",accent:"#00d4ff",accentDim:"#0099bb",accentGlow:"rgba(0,212,255,0.12)",green:"#00e5a0",greenDim:"rgba(0,229,160,0.10)",red:"#ff4d6d",redDim:"rgba(255,77,109,0.10)",amber:"#ffb700",amberDim:"rgba(255,183,0,0.10)",text:"#e8f0fe",textMid:"#8899bb",textDim:"#4a5568"};

const FAQS=[
  {q:"Where does the velocity banking strategy come from?",a:"Velocity banking has roots that predate modern finance. Before the 1930s, homes were commonly financed with flexible lines of credit — open instruments where money flowed in and out freely. The 30-year fixed mortgage was engineered to create predictable, front-loaded interest income for banks. Velocity banking revives the older, more efficient approach: use a revolving line of credit as your primary financial account, route all income through it, and systematically eliminate mortgage principal in lump-sum chunks. The math has always been there. Most homeowners were simply never shown it."},
  {q:"What is velocity banking and what does 'chunking' mean?",a:"Velocity banking is a strategy where you use a HELOC as your primary bank account, routing all income through it to minimize daily interest, then periodically drawing lump sums (chunks) onto your mortgage principal to eliminate front-loaded interest. The core insight is this: time and balance are more important than interest rate. A mortgage keeps a massive balance for decades. A HELOC balance drops aggressively every month as income flows through. The result: even at a higher HELOC rate, you pay far less total interest because the balance at risk is always shrinking."},
  {q:"If my HELOC rate is higher than my mortgage rate, how does this still save money?",a:"This is the most common objection — here's the honest answer. The HELOC balance is never fixed. It drops every month as your income flows through it. You're paying a higher rate on a rapidly declining number, not a fixed one. Meanwhile, the lump-sum chunks onto the mortgage eliminate massive blocks of principal and all the compounding interest that would have accrued on them for decades. The net effect: total HELOC interest over the entire strategy is often only a few thousand dollars per year, while mortgage interest saved is in the tens of thousands. The math works because you're comparing a small, shrinking HELOC against a large, slow-moving mortgage."},
  {q:"What is paycheck parking and why does it matter?",a:"Paycheck parking is depositing your entire paycheck directly into the HELOC the moment you're paid, rather than into a checking account. Every dollar sitting in the HELOC reduces its balance — which reduces the average daily balance — which reduces interest charged that month. The math is simple: money sitting in a checking account earns nearly nothing while your HELOC charges interest daily. Parking your paycheck in the HELOC the day it arrives, and paying bills at the end of the month via credit card, maximizes the time your income spends reducing the HELOC balance. Some community banks offer sweep accounts that automate this."},
  {q:"Why use a community bank or credit union instead of a big bank?",a:"Big banks typically don't support HELOC-as-checking-account banking and often won't allow direct deposit into a HELOC. Community banks and credit unions are more likely to offer: direct deposit capability into a HELOC, debit card access to draw funds, online bill pay, sweep accounts that automatically move checking balances to the HELOC, better rates and fewer fees. Avoid big national banks for this strategy. Call local credit unions first — ask specifically if they allow direct deposit into a HELOC and if they offer a sweep account."},
  {q:"What is the 'equity draw per cycle' and why does 25% often work best?",a:"When your HELOC hits $0 that's a completed cycle. You then draw new equity from your home and chunk it onto the mortgage. The draw percentage controls the size of each chunk. Drawing 100% means carrying a large HELOC balance at a higher rate for a long time. Drawing 25% keeps the HELOC small so it clears fast and stays cheap — while still delivering meaningful mortgage paydown. At low mortgage rates (3–4%), go even lower (10–15%) to minimize HELOC interest. At higher mortgage rates (5%+), you can go higher since the rate differential is smaller."},
  {q:"What is LTV and how does it affect my available credit?",a:"LTV stands for Loan-to-Value — your mortgage balance divided by your home's value. Most lenders cap combined mortgage + HELOC at 80% LTV. Example: $500k home × 80% = $400k ceiling. If you owe $320k, you can access up to $80k via HELOC. As your mortgage drops AND as your home appreciates, your available ceiling grows — allowing larger chunks each cycle. Home appreciation is a powerful multiplier: a $500k home appreciating 4%/yr adds $20k per year to your HELOC ceiling independently of any principal paydown."},
  {q:"Should I use my HELOC as my actual checking account?",a:"Yes — this is the core mechanic. When your paycheck hits the HELOC, your balance drops before expenses leave. That temporary reduction lowers your average daily balance for the month, reducing interest. Using a credit card for daily purchases (paid in full from the HELOC monthly) extends the time your income sits in the HELOC. Keep credit cards open and active — strong credit is important for maintaining HELOC access. Critical rule: never carry a credit card balance. Pay it in full every month from the HELOC."},
  {q:"What are the real risks?",a:"Go in clear-eyed: (1) Variable rate risk — HELOCs are variable. If Prime rises your HELOC interest increases. Model a worst case in the calculator. (2) Income dependence — if income drops or expenses spike, the HELOC balance may stop declining. Build a real emergency fund separate from the HELOC before starting. (3) Discipline required — the HELOC is accessible 24/7. One major non-essential draw can derail a cycle. (4) Bank can freeze the line — if home values drop, lenders have frozen HELOCs during downturns. (5) Draw period — HELOCs typically have a 10-year draw period, then convert to repayment. Ensure your payoff timeline fits."},
  {q:"Do I need good credit to open a HELOC?",a:"Most lenders require 620+ credit score, with better rates at 700+. You also need: at least 20% equity, stable verifiable income, debt-to-income ratio under 43%, and the home as your primary residence. The move: shop multiple community banks and credit unions — don't just go to your existing bank. Rates and terms vary significantly. Ask specifically about draw period length, whether they allow direct deposit into the HELOC, and whether there are early termination fees."},
  {q:"Is HELOC interest tax deductible?",a:"Under current US tax law (post-2017 Tax Cuts and Jobs Act), HELOC interest is only deductible if funds are used to buy, build, or substantially improve the home securing the loan. Using HELOC funds to pay down your mortgage principal likely does not qualify. Consult a CPA for your specific situation — don't count on a deduction when running your numbers."},
  {q:"My mortgage rate is 2.5–4%. Does velocity banking still make sense?",a:"Even at low mortgage rates, the strategy has value — the argument just shifts from pure interest savings to liquidity and payoff acceleration. At 3.25% mortgage vs 8.5% HELOC, you're borrowing at a premium — but the HELOC pays down fast (months, not decades) and the mortgage principal elimination is large. The net HELOC interest cost is modest. Meanwhile, extra payments made directly to a 3.25% mortgage lock your cash away permanently unless you refinance. With the HELOC strategy, your money stays accessible at all times. Set the redraw slider low (10–15%) to minimize HELOC interest cost, and check the break-even year. If it crosses positive before your target payoff, the strategy wins."},
];

function simulate(p){
  const{mortgageBal,mortgageRate,mortgagePmt,homeValue,helocRate,monthlyIncome,livingExpenses,monthlyDebts,savings,redrawPct,ltvLimit,appreciationRate,helocFees,remainingYears}=p;
  const ltv=ltvLimit/100;
  const dailyRate=helocRate/100/365;
  const mr=mortgageRate/100/12;
  const ar=appreciationRate/100/12;
  const totalFees=helocFees.origination+(helocFees.annual/12);
  let currentHomeValue=homeValue;
  const maxDraw=Math.max(0,currentHomeValue*ltv-mortgageBal);
  if(maxDraw<5000)return null;
  const initialDraw=maxDraw;
  const savingsApplied=Math.min(savings,initialDraw);
  let mBal=mortgageBal-initialDraw,hBal=initialDraw-savingsApplied;
  let totalMInt=0,totalHInt=0,totalFeesPaid=helocFees.origination,month=0;
  const yearData=[],cycleLog=[{cycle:1,month:0,draw:initialDraw,mortgageAfter:mBal,homeValue:currentHomeValue}];
  let yrMInt=0,yrHInt=0,cycleCount=1;

  // baseline interest (no action) — calculate upfront
  // Compute P+I only for amortization (escrow/T&I doesn't reduce principal)
  const piPmt=(()=>{const n=remainingYears*12;const r=mr;if(r===0)return mortgageBal/n;return mortgageBal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);})();
  let bMBal=mortgageBal,bMo=0,bMInt=0;
  while(bMBal>0.01&&bMo<600){bMo++;const i=bMBal*mr;bMInt+=i;bMBal=Math.max(0,bMBal+i-piPmt);}
  // running baseline interest for cumulative comparison
  let bMBalR=mortgageBal,bIntSoFar=0;

  function oneMonth(hb,mp,dp){
    let bal=hb+mp+dp,cashBuf=0,interest=0;
    const half=monthlyIncome/2;
    for(let day=1;day<=30;day++){
      if(day===1||day===15){const pay=Math.min(bal,half);bal-=pay;cashBuf+=(half-pay);}
      if(day===25){const fc=Math.min(cashBuf,livingExpenses);cashBuf-=fc;bal+=(livingExpenses-fc);bal=Math.max(0,bal);}
      interest+=Math.max(0,bal)*dailyRate;
    }
    return{endBal:Math.max(0,bal-cashBuf),interest};
  }

  while((mBal>0.01||hBal>0.01)&&month<600){
    month++;
    // home appreciates monthly
    currentHomeValue*=(1+ar);
    const mp=mBal>0?mortgagePmt:0;
    const r=oneMonth(hBal,mp,monthlyDebts);
    totalHInt+=r.interest;yrHInt+=r.interest;hBal=r.endBal;
    // annual HELOC fee
    if(month%12===0){totalFeesPaid+=helocFees.annual;yrHInt+=helocFees.annual;}
    if(mBal>0){const mInt=mBal*mr;totalMInt+=mInt;yrMInt+=mInt;mBal=Math.max(0,mBal+mInt-mp);}
    // baseline tracking
    if(bMBalR>0){const bi=bMBalR*mr;bIntSoFar+=bi;bMBalR=Math.max(0,bMBalR+bi-piPmt);}

    if(hBal<500&&mBal>1000){
      const ceiling=currentHomeValue*ltv-mBal;
      const draw=Math.min(ceiling*redrawPct,mBal);
      if(draw>1000){mBal-=draw;hBal=draw;cycleCount++;cycleLog.push({cycle:cycleCount,month,draw,mortgageAfter:mBal,homeValue:currentHomeValue,ceiling});}
    }
    if(month%12===0){
      const totalPaid=totalMInt+totalHInt+totalFeesPaid;
      const blendedRate=mBal>0?(totalMInt/month*12/((mortgageBal+mBal)/2)*100):0;
      const savedVsNothing=bIntSoFar-totalPaid;
      yearData.push({year:month/12,mBal,hBal,yrMInt,yrHInt,yrTotal:yrMInt+yrHInt,cumTotal:totalPaid,liquidity:Math.max(0,currentHomeValue*ltv-mBal-hBal),homeValue:currentHomeValue,blendedRate,savedVsNothing,hasCycle:cycleLog.some(c=>c.month>0&&Math.floor(c.month/12)+1===month/12)});
      yrMInt=0;yrHInt=0;
    }
  }
  if(month%12!==0){
    yearData.push({year:Math.ceil(month/12),mBal:0,hBal:0,yrMInt,yrHInt,yrTotal:yrMInt+yrHInt,cumTotal:totalMInt+totalHInt+totalFeesPaid,liquidity:currentHomeValue*ltv,partial:true,homeValue:currentHomeValue,blendedRate:0,savedVsNothing:bMInt-(totalMInt+totalHInt+totalFeesPaid),hasCycle:false});
  }

  let dMBal=mortgageBal-savings,dMo=0,dMInt=0;
  const extra=Math.max(0,monthlyIncome-livingExpenses-mortgagePmt-monthlyDebts);
  while(dMBal>0.01&&dMo<600){dMo++;const i=dMBal*mr;dMInt+=i;dMBal=Math.max(0,dMBal+i-Math.min(dMBal+i,piPmt+extra));}

  const totalCost=totalMInt+totalHInt+totalFeesPaid;
  return{months:month,totalMInt,totalHInt,totalFeesPaid,total:totalCost,yearData,cycleLog,cycleCount,initialDraw,maxDraw,savingsApplied,ltvCeiling:currentHomeValue*ltv,baseline:{months:bMo,totalInt:bMInt},direct:{months:dMo,totalInt:dMInt},interestSavedVsBaseline:bMInt-totalCost,extraCostVsDirect:totalCost-dMInt};
}

const fmt=n=>"$"+Math.round(n).toLocaleString();
const fmtD=n=>"$"+Number(n).toFixed(0);
const mo=m=>`${Math.floor(m/12)}y ${m%12}mo`;
const pct=n=>n.toFixed(2)+"%";

function InfoTip({text}){
  return(<span className="tooltip" style={{marginLeft:5,cursor:"help"}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:14,height:14,borderRadius:"50%",background:"#1a2235",border:"1px solid #2a3a55",fontSize:9,color:"#8899bb",fontFamily:"monospace"}}>?</span><span className="tip">{text}</span></span>);
}
function Label({children,tip}){
  return(<div style={{fontSize:11,color:C.textMid,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"monospace",marginBottom:5,display:"flex",alignItems:"center"}}>{children}{tip&&<InfoTip text={tip}/>}</div>);
}
function SliderInput({label,value,min,max,step,onChange,format,hint,tip}){
  const trackRef=React.useRef(null);
  const fillRef=React.useRef(null);
  const thumbRef=React.useRef(null);
  const badgeRef=React.useRef(null);

  const calcValue=clientX=>{
    const rect=trackRef.current.getBoundingClientRect();
    const raw=((clientX-rect.left)/rect.width)*(max-min)+min;
    const stepped=Math.round(raw/step)*step;
    return Math.min(max,Math.max(min,parseFloat(stepped.toFixed(10))));
  };

  const updateDOM=v=>{
    const p=((v-min)/(max-min))*100;
    if(fillRef.current) fillRef.current.style.width=p+"%";
    if(thumbRef.current) thumbRef.current.style.left=p+"%";
    if(badgeRef.current) badgeRef.current.textContent=format(v);
  };

  const onDown=e=>{
    e.preventDefault();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    let lastVal=calcValue(clientX);
    updateDOM(lastVal);
    const onMove=ev=>{
      ev.preventDefault();
      const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
      lastVal=calcValue(cx);
      updateDOM(lastVal);
    };
    const onUp=()=>{
      onChange(lastVal);
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onUp);
    };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove,{passive:false});
    window.addEventListener("touchend",onUp);
  };

  const pct=((value-min)/(max-min))*100;
  return(
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,alignItems:"center"}}>
        <Label tip={tip}>{label}</Label>
        <span ref={badgeRef} style={{fontSize:13,color:"#00d4ff",fontFamily:"monospace",fontWeight:700,background:"rgba(0,212,255,0.08)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:5,padding:"2px 7px"}}>{format(value)}</span>
      </div>
      <div ref={trackRef} onMouseDown={onDown} onTouchStart={onDown}
        style={{position:"relative",height:24,cursor:"grab",userSelect:"none"}}>
        <div style={{position:"absolute",top:"50%",left:0,right:0,height:4,borderRadius:2,background:"#1e2d45",transform:"translateY(-50%)"}}/>
        <div ref={fillRef} style={{position:"absolute",top:"50%",left:0,width:pct+"%",height:4,borderRadius:2,background:"#00d4ff",transform:"translateY(-50%)"}}/>
        <div ref={thumbRef} style={{position:"absolute",top:"50%",left:pct+"%",width:18,height:18,borderRadius:"50%",background:"#00d4ff",transform:"translate(-50%,-50%)",boxShadow:"0 0 0 4px rgba(0,212,255,0.25)",pointerEvents:"none"}}/>
      </div>
      {hint&&<div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        <span style={{fontSize:9,color:"#4a5568",fontFamily:"monospace"}}>{format(min)}</span>
        <span style={{fontSize:9,color:"#4a5568",fontFamily:"monospace"}}>{hint}</span>
        <span style={{fontSize:9,color:"#4a5568",fontFamily:"monospace"}}>{format(max)}</span>
      </div>}
    </div>
  );
}
function useNumberInput(value,onChange){
  const[raw,setRaw]=useState(value===0?"":String(value));
  // Only sync from parent when it's a programmatic change (not user typing)
  const isFocused=React.useRef(false);
  useEffect(()=>{if(!isFocused.current){setRaw(value===0?"":String(value));}},[value]);
  const handleFocus=()=>{isFocused.current=true;};
  // While typing: only update local display, never call onChange
  const handleChange=e=>{setRaw(e.target.value);};
  // On blur: commit the value to parent
  const handleBlur=e=>{
    isFocused.current=false;
    const n=parseFloat(e.target.value);
    if(isNaN(n)||n<0){setRaw("");onChange(0);}
    else{setRaw(String(n));onChange(n);}
  };
  return{raw,handleFocus,handleChange,handleBlur};
}
function NumInput({label,value,onChange,tip,prefix="$"}){
  const{raw,handleFocus,handleChange,handleBlur}=useNumberInput(value,onChange);
  return(<div style={{marginBottom:14}}><Label tip={tip}>{label}</Label><div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}><span style={{padding:"8px 10px",color:C.textDim,fontFamily:"monospace",fontSize:13,borderRight:`1px solid ${C.border}`}}>{prefix}</span><input type="text" inputMode="decimal" value={raw} onFocus={handleFocus} onChange={handleChange} onBlur={handleBlur} style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"8px 10px",color:C.text,fontFamily:"monospace",fontSize:14}}/></div></div>);
}
function ExpenseRow({label,value,onChange,tip}){
  const{raw,handleFocus,handleChange,handleBlur}=useNumberInput(value,onChange);
  return(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{flex:1,fontSize:12,color:C.textMid,display:"flex",alignItems:"center",gap:4}}>{label}{tip&&<InfoTip text={tip}/>}</div><div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:5,overflow:"hidden",width:110}}><span style={{padding:"5px 7px",color:C.textDim,fontFamily:"monospace",fontSize:12,borderRight:`1px solid ${C.border}`}}>$</span><input type="text" inputMode="decimal" value={raw} onFocus={handleFocus} onChange={handleChange} onBlur={handleBlur} style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"5px 7px",color:C.text,fontFamily:"monospace",fontSize:12,width:60}}/></div></div>);
}
function DollarInput({value,onChange,suffix}){
  const{raw,handleFocus,handleChange,handleBlur}=useNumberInput(value,onChange);
  return(<div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}><span style={{padding:"7px 9px",color:C.textDim,fontFamily:"monospace",fontSize:12,borderRight:`1px solid ${C.border}`}}>$</span><input type="text" inputMode="decimal" value={raw} onFocus={handleFocus} onChange={handleChange} onBlur={handleBlur} style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"7px 9px",color:C.text,fontFamily:"monospace",fontSize:13}}/>{suffix&&<span style={{padding:"7px 9px",color:C.textDim,fontFamily:"monospace",fontSize:10,borderLeft:`1px solid ${C.border}`}}>{suffix}</span>}</div>);
}
function Card({label,value,sub,color=C.accent}){
  return(<div style={{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderTop:`2px solid ${color}`,borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",gap:14}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:10,color:C.textMid,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"monospace",marginBottom:4}}>{label}</div><div style={{fontSize:22,fontWeight:800,color,fontFamily:"monospace",lineHeight:1}}>{value}</div></div>{sub&&<div style={{fontSize:12,color:C.textDim,lineHeight:1.5,maxWidth:140,textAlign:"right",flexShrink:0}}>{sub}</div>}</div>);
}
function Tab({label,active,onClick}){
  return(<button onClick={onClick} style={{flex:1,padding:"8px 4px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,letterSpacing:"0.04em",textTransform:"uppercase",background:active?C.accent:"transparent",color:active?C.bg:C.textMid,fontWeight:active?700:400,transition:"all 0.15s"}}>{label}</button>);
}

}

function HowItWorks(){
  const steps=[
    {n:"01",title:"Open a HELOC — at the right bank",color:C.accent,desc:"The single most important decision: avoid big banks. Go to a community bank or credit union. They offer better rates, fewer fees, and are more likely to allow direct deposit into the HELOC. A HELOC is a revolving line secured by your home equity — you only pay interest on what you borrow, and you can draw and repay it as many times as you want during the draw period (typically 10 years)."},
    {n:"02",title:"The Chunk — day one lump sum",color:C.accent,desc:"Draw a meaningful lump sum from the HELOC and apply it directly to your mortgage principal. This is called chunking. A $20–$30k chunk eliminates principal that would have generated years of front-loaded interest. Your mortgage drops immediately. Your HELOC balance rises by the same amount — but this debt is on simple interest, not amortized."},
    {n:"03",title:"Paycheck parking",color:C.green,desc:"Direct deposit your entire paycheck into the HELOC the moment you're paid. Every dollar sitting in the HELOC reduces its balance — which reduces your average daily balance — which reduces the interest charged that month. This is where most of the HELOC interest savings come from. Don't let income sit in a checking account earning nothing while your HELOC charges interest."},
    {n:"04",title:"Use a credit card for monthly bills",color:C.green,desc:"Pay all monthly expenses on a credit card throughout the month. On the due date, pay the card in full from the HELOC. This keeps your income parked in the HELOC as long as possible each month, minimizing the average daily balance. Keep your credit cards open and active — strong credit supports your ability to maintain the HELOC."},
    {n:"05",title:"Redraw and repeat the cycle",color:C.amber,desc:"When your HELOC reaches $0, you've completed a cycle. Draw another chunk onto the mortgage. Because your home has been appreciating and your mortgage has been declining, your available HELOC ceiling is likely larger than the last draw. Each cycle eliminates a larger block of principal. Each cycle collapses your mortgage balance from both directions."},

          <strong style={{color:C.accent}}>Why the loop accelerates so fast:</strong> A traditional mortgage recasts on a fixed amortization schedule — month 242 of a 30-year mortgage is already predetermined. The HELOC recasts automatically every single day. Deposit $5,000 today and tomorrow you're charged interest on $5,000 less. That's the core advantage — not the rate, but the <em style={{color:C.text}}>average daily balance dropping continuously</em>.
        </div>

    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{padding:"16px 24px",background:C.bg,borderBottom:`1px solid ${C.border}`}}>

        <div style={{fontSize:17,fontWeight:400,color:C.text}}>Your Interest Charge Changes Every Month — Here's Why That Matters</div>
      </div>
      <div style={{padding:"20px 24px"}}>
        <div style={{fontSize:13,color:C.textMid,marginBottom:20,lineHeight:1.7}}>Unlike a mortgage — where your interest is locked to a 30-year amortization schedule and the bank collects most of it in the early years — HELOC interest is calculated daily on the actual outstanding balance. Every dollar you deposit reduces what you owe in interest starting the next day. Here's how one cycle might look:</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          {[

                <div><div style={{fontSize:9,color:C.textDim,fontFamily:"monospace",marginBottom:2}}>DAILY COST</div><div style={{fontSize:12,fontFamily:"monospace",color:C.textMid}}>{daily}</div></div>
              </div>
              <div style={{fontSize:11,color:C.textDim,lineHeight:1.5,borderTop:`1px solid ${C.border}`,paddingTop:8}}>{note}</div>

          <strong style={{color:C.accent}}>The math:</strong> Daily Interest = (HELOC Balance × Annual Rate) ÷ 365. At 8.5%, a $25,000 balance costs $5.82/day. A $5,000 balance costs $1.16/day. The rate stays fixed — only the balance changes. This is why paycheck parking is so powerful: every day your income sits in the HELOC instead of a checking account, it's reducing tomorrow's interest charge.
        </div>
      </div>
    </div>
    </div>
  );
}

function RiskScenarios({baseResult,params}){
  if(!baseResult)return null;
  const scenarios=[
    {label:"Rates Rise +2%",desc:"HELOC rate increases by 2% (e.g., Prime rate rises)",mod:{helocRate:params.helocRate+2},color:C.amber},
    {label:"Rates Rise +4%",desc:"Significant rate increase — worst case environment",mod:{helocRate:params.helocRate+4},color:C.red},
    {label:"Income Drops 20%",desc:"Job loss, reduced hours, or loss of second income",mod:{monthlyIncome:params.monthlyIncome*0.8},color:C.amber},
    {label:"No Appreciation",desc:"Home value stays flat — no equity growth benefit",mod:{appreciationRate:0},color:C.textMid},
    {label:"Higher Appreciation +5%",desc:"Strong real estate market accelerates equity draws",mod:{appreciationRate:5},color:C.green},
    {label:"Larger Surplus +$1k",desc:"Extra income or reduced expenses each month",mod:{monthlyIncome:params.monthlyIncome+1000},color:C.green},
  ];
  return(<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}><div style={{padding:"18px 22px",background:C.bg,borderBottom:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.accent,fontFamily:"monospace",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:5}}>// Risk Scenarios</div><div style={{fontSize:20,fontWeight:400,color:C.text,marginBottom:4}}>What If Things Change?</div><div style={{fontSize:13,color:C.textMid}}>See how your payoff timeline and total interest change under different conditions. HELOCs are variable rate — stress-testing matters.</div></div><div style={{overflowX:"auto"}}><table><thead><tr style={{background:C.bg}}>{["Scenario","Description","Payoff","Total Interest","vs Your Plan","Verdict"].map(h=>(<th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:9,color:C.textDim,fontFamily:"monospace",letterSpacing:"0.04em",textTransform:"uppercase",fontWeight:400,whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead><tbody><tr style={{background:C.accentGlow}}><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:C.accent,fontWeight:700}}>Your Current Plan</td><td style={{padding:"10px 14px",fontSize:12,color:C.textMid}}>Base scenario</td><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:C.text}}>{mo(baseResult.months)}</td><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:C.text}}>{fmt(baseResult.total)}</td><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:C.textDim}}>—</td><td style={{padding:"10px 14px"}}><span style={{fontSize:10,fontFamily:"monospace",color:C.accent,background:C.accentGlow,padding:"2px 8px",borderRadius:10}}>BASELINE</span></td></tr>{scenarios.map((s,i)=>{const sr=simulate({...params,...s.mod});if(!sr)return null;const moDiff=sr.months-baseResult.months;const costDiff=sr.total-baseResult.total;const worse=moDiff>6||costDiff>5000;const better=moDiff<-3||costDiff<-2000;return(<tr key={i} style={{borderBottom:`1px solid ${C.border}`}}><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:s.color,fontWeight:700}}>{s.label}</td><td style={{padding:"10px 14px",fontSize:12,color:C.textMid}}>{s.desc}</td><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:C.text}}>{mo(sr.months)}</td><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:C.text}}>{fmt(sr.total)}</td><td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:costDiff>0?C.red:C.green}}>{costDiff>0?"+":""}{fmt(costDiff)}</td><td style={{padding:"10px 14px"}}><span style={{fontSize:10,fontFamily:"monospace",color:worse?C.red:better?C.green:C.textMid,background:worse?C.redDim:better?C.greenDim:"transparent",padding:"2px 8px",borderRadius:10}}>{worse?"⚠ WATCH":better?"✓ BETTER":"SIMILAR"}</span></td></tr>);})}</tbody></table></div><div style={{padding:"12px 20px",background:C.bg,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.textDim,lineHeight:1.6}}><strong style={{color:C.textMid}}>Key insight:</strong> The strategy is most vulnerable to rate increases AND income drops happening simultaneously. If both occur, consider pausing redraws and just letting income pay down the HELOC without drawing new equity until conditions improve.</div></div>);
}

function BreakevenChart({result}){

function plainEnglishRow(y,prevY,cycleLog){
  const hasCycle=cycleLog.some(c=>c.month>0&&Math.floor((c.month-1)/12)===y.year-1);
  const mortgageDrop=prevY?prevY.mBal-y.mBal:0;
  const parts=[];
  if(hasCycle)parts.push(`🔄 Redraw cycle — lump sum applied to mortgage`);
  if(y.mBal===0&&prevY&&prevY.mBal>0)parts.push(`🎉 Mortgage fully paid off!`);
  else if(mortgageDrop>15000)parts.push(`Mortgage dropped ${fmt(mortgageDrop)}`);
  if(y.yrHInt>y.yrMInt)parts.push(`HELOC interest exceeded mortgage interest this year`);
  if(y.savedVsNothing>0&&(!prevY||prevY.savedVsNothing<=0))parts.push(`✓ Strategy now ahead of doing nothing`);
  return parts.join(" · ")||"Steady progress — HELOC paying down from monthly surplus";
}

        </div>
      </div>

      {/* NAV */}
      <div style={{borderBottom:`1px solid ${C.border}`,background:C.surface,position:"sticky",top:0,zIndex:50}}>

          {[["calculator","🧮 Calculator"],["results","📊 Results"],["risk","⚠️ Risk"]].map(([key,label])=>(
            <button key={key} onClick={()=>setActiveSection(key)} style={{flex:1,padding:"16px 8px",background:"transparent",border:"none",borderBottom:`3px solid ${activeSection===key?C.accent:"transparent"}`,cursor:"pointer",fontFamily:"monospace",fontSize:11,color:activeSection===key?C.accent:C.textMid,letterSpacing:"0.05em",textTransform:"uppercase",transition:"all 0.15s",whiteSpace:"nowrap"}}>{label}</button>
          ))}
          <div style={{width:1,background:C.border,margin:"10px 0"}}/>
          {[["learn","📖 How It Works"],["lender","🏦 Checklists"],["faq","❓ FAQ"]].map(([key,label])=>(
            <button key={key} onClick={()=>setActiveSection(key)} style={{flex:1,padding:"16px 8px",background:"transparent",border:"none",borderBottom:`3px solid ${activeSection===key?C.accent:"transparent"}`,cursor:"pointer",fontFamily:"monospace",fontSize:11,color:activeSection===key?C.accent:C.textMid,letterSpacing:"0.05em",textTransform:"uppercase",transition:"all 0.15s",whiteSpace:"nowrap"}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1400,margin:"0 auto",padding:"28px 28px"}}>

        {activeSection==="learn"&&<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:20}}><HowItWorks/><WhoIsThisFor/></div>}
        {activeSection==="lender"&&<div className="fade-in"><LenderChecklist/><RealtorChecklist/></div>}
        {activeSection==="risk"&&<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:20}}><RiskScenarios baseResult={result} params={params}/><BreakevenChart result={result}/></div>}
        {activeSection==="faq"&&<div className="fade-in"><FaqSection/></div>}

        {activeSection==="calculator"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>

          {/* ── LEFT PANEL ── */}
          <div>

            {/* helper */}
            {(()=>{
              const Accordion=({id,title,summary,children})=>{
                const open=!!openSections[id];
                return(
                  <div style={{background:C.surface,border:`1px solid ${open?C.accent+"55":C.border}`,borderRadius:12,marginBottom:12,overflow:"hidden",transition:"border-color 0.2s"}}>
                    <button onClick={()=>toggleSection(id)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",gap:10}}>
                      <span style={{fontSize:11,color:open?C.accent:C.text,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>{title}</span>
                      <span style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                        {!open&&summary&&<span style={{fontSize:11,color:C.textDim,fontFamily:"monospace"}}>{summary}</span>}
                        <span style={{color:open?C.accent:C.textDim,fontSize:18,fontFamily:"monospace",transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(0deg)":"rotate(-90deg)"}}>▾</span>
                      </span>
                    </button>
                    <div style={{display:open?"block":"none",padding:"4px 18px 18px",borderTop:`1px solid ${C.border}`}}>{children}</div>
                  </div>
                );
              };
              const TI=({label,mode,setMode,monthly,setMonthly,annual,setAnnual,tip})=>(
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
                    <span style={{fontSize:12,color:C.textMid,display:"flex",alignItems:"center",gap:4}}>{label}<InfoTip text={tip}/></span>
                    <div style={{display:"flex",background:C.bg,border:`1px solid ${C.border}`,borderRadius:5,overflow:"hidden"}}>
                      {[["monthly","Monthly"],["annual","Annual"],["escrow","In escrow"]].map(([v,l])=>(
                        <button key={v} onClick={()=>setMode(v)} style={{padding:"3px 9px",background:mode===v?C.accent:"transparent",color:mode===v?C.bg:C.textDim,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,fontWeight:mode===v?700:400}}>{l}</button>
                      ))}
                    </div>
                  </div>
                  {mode!=="escrow"&&(
                    <div>
                        <DollarInput value={mode==="annual"?annual:monthly} onChange={n=>{mode==="annual"?setAnnual(n):setMonthly(n);}} suffix={mode==="annual"?"/yr":"/mo"}/>
                      {mode==="annual"&&<div style={{fontSize:10,color:C.textDim,marginTop:4}}>= {fmt(annual/12)}/mo</div>}
                    </div>
                  )}
                  {mode==="escrow"&&<div style={{fontSize:11,color:C.textDim,lineHeight:1.5}}>Already included in your total mortgage payment above — no separate entry needed.</div>}
                </div>
              );

              const mortgageSummary=mortgageBal>0?`${fmt(mortgageBal)} @ ${mortgageRate}%`:null;
              const helocSummary=`${helocRate}% · ${ltvLimit}% LTV`;
              const incomeSummary=monthlyIncome>0?fmt(monthlyIncome):null;
              const expenseSummary=livingExpenses>0?fmt(livingExpenses):null;

              return(<>

              {/* ── MORTGAGE ── */}
              <Accordion id="mortgage" title="🏠 Mortgage Details" summary={mortgageSummary}>
                <NumInput label="Current Mortgage Balance" value={mortgageBal} onChange={setMortgageBal} tip="The remaining principal you owe — find it on your monthly statement."/>
                <SliderInput label="Interest Rate" value={mortgageRate} min={2} max={9} step={0.05} onChange={setMortgageRate} format={v=>v.toFixed(2)+"%"} hint="US 30yr fixed avg ~6.8% as of 2025" tip="Your annual mortgage rate. Check your loan documents."/>

                {/* Payment mode */}
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
                    <span style={{fontSize:12,color:C.textMid}}>Monthly Payment</span>
                    <div style={{display:"flex",background:C.bg,border:`1px solid ${C.border}`,borderRadius:5,overflow:"hidden"}}>
                      {[["pi","P+I only"],["total","Total w/ escrow"]].map(([v,l])=>(
                        <button key={v} onClick={()=>setPmtMode(v)} style={{padding:"3px 9px",background:pmtMode===v?C.accent:"transparent",color:pmtMode===v?C.bg:C.textDim,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,fontWeight:pmtMode===v?700:400}}>{l}</button>
                      ))}
                    </div>
                  </div>
                  <DollarInput value={pmtMode==="total"?totalPmt:mortgagePmt} onChange={n=>{pmtMode==="total"?setTotalPmt(n):setMortgagePmt(n);}} suffix="/mo"/>
                  {pmtMode==="pi"&&<div style={{fontSize:10,color:C.textDim,marginTop:4}}>Principal + interest only. Find the P+I line on your statement — not the total if tax/insurance are escrowed.</div>}
                  {pmtMode==="total"&&<div style={{fontSize:10,color:C.textDim,marginTop:4}}>Full payment including escrow. P+I calculated: <span style={{color:C.accent,fontWeight:700}}>{fmt(piOnly)}</span> (after subtracting T&I below)</div>}
                </div>

                {/* Property Tax */}
                <TI
                  label="Property Tax"
                  mode={propTaxMode} setMode={setPropTaxMode}
                  monthly={propTaxMonthly} setMonthly={setPropTaxMonthly}
                  annual={propTaxAnnual} setAnnual={setPropTaxAnnual}
                  tip="Your annual property tax divided by 12 if paying monthly, or your annual bill. Select 'In escrow' if it's already bundled into your mortgage payment above."
                />

                {/* Home Insurance */}
                <TI
                  label="Home Insurance"
                  mode={insurMode} setMode={setInsurMode}
                  monthly={insurMonthly} setMonthly={setInsurMonthly}
                  annual={insurAnnual} setAnnual={setInsurAnnual}
                  tip="Homeowner's insurance premium. Select 'In escrow' if already bundled into your mortgage payment."
                />

                <div style={{marginBottom:18}}>
                  <Label tip="The month and year your mortgage is scheduled to be paid off.">Loan End Date</Label>
                  <div style={{display:"flex",gap:8,marginTop:6}}>
                    <select value={endMonth} onChange={e=>setEndMonth(Number(e.target.value))}
                      style={{flex:1,background:"#0d1f35",color:"#e2e8f0",border:"1px solid #1e3a5f",borderRadius:6,padding:"6px 8px",fontSize:14}}>
                      {["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].map((m,i)=>(
                        <option key={i} value={i+1}>{m}</option>
                      ))}
                    </select>
                    <select value={endYear} onChange={e=>setEndYear(Number(e.target.value))}
                      style={{flex:2,background:"#0d1f35",color:"#e2e8f0",border:"1px solid #1e3a5f",borderRadius:6,padding:"6px 8px",fontSize:14}}>
                      {Array.from({length:36},(_,i)=>new Date().getFullYear()+i).map(y=>(
                        <option key={y} value={y}>{y}</option>
                      ))}
                    </select>
                  </div>
                  <div style={{marginTop:4,fontSize:11,color:"#4a9eff",fontFamily:"monospace"}}>{remainingYears} year{remainingYears!==1?"s":""} remaining</div>
                </div>
                <NumInput label="Current Home Value" value={homeValue} onChange={setHomeValue} tip="Use Zillow, Redfin, or a recent appraisal. Lenders will appraise independently before issuing a HELOC."/>

                <div style={{background:C.bg,borderRadius:8,border:`1px solid ${C.border}`,padding:"10px 12px",marginTop:4}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:11,color:C.textMid,fontFamily:"monospace"}}>Total monthly housing cost</span>
                    <span style={{fontSize:14,fontFamily:"monospace",color:C.amber,fontWeight:700}}>{fmt(piOnly+taxInsurance)}</span>
                  </div>
                  <div style={{fontSize:10,color:C.textDim}}>P+I {fmt(piOnly)}{propTax>0?` + Tax ${fmt(propTax)}`:""}{homeInsur>0?` + Insurance ${fmt(homeInsur)}`:""}{(propTaxMode==="escrow"||insurMode==="escrow")?" (some in escrow)":""}</div>
                </div>
              </Accordion>

              {/* ── HELOC ── */}
              <Accordion id="heloc" title="🏦 HELOC Settings" summary={helocSummary}>
                <SliderInput label="HELOC Interest Rate" value={helocRate} min={4} max={13} step={0.25} onChange={setHelocRate} format={v=>v.toFixed(2)+"%"} hint="Usually Prime + 0–2%. Credit unions often lower." tip="The single most important input. A lower HELOC rate dramatically improves the strategy. Shop at least 3 lenders — especially local credit unions — before accepting any offer."/>
                <SliderInput label="LTV Limit" value={ltvLimit} min={60} max={90} step={5} onChange={setLtvLimit} format={v=>v+"%"} hint="80% is standard. Some credit unions offer 85–90%." tip="Your mortgage + HELOC combined can't exceed this % of home value. Ask each lender — it varies."/>
                <SliderInput label="Home Appreciation Rate" value={appreciationRate} min={0} max={8} step={0.5} onChange={setAppreciationRate} format={v=>v.toFixed(1)+"%/yr"} hint="US avg ~3–4%/yr. High-growth markets 5–7%." tip="As your home appreciates, your HELOC ceiling grows each cycle. Set to 0% for a conservative scenario."/>
                <LTVVisual homeValue={homeValue} mortgageBal={mortgageBal} ltvLimit={ltvLimit}/>
                <div style={{marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                  <button onClick={()=>setShowHelocFees(f=>!f)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"transparent",border:"none",cursor:"pointer",padding:0,marginBottom:showHelocFees?10:0}}>
                    <span style={{fontSize:11,color:C.textDim,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>HELOC Fees <InfoTip text="Most lenders charge $0–$500 to open and $0–$100/yr annually. Many credit unions waive entirely — always ask."/></span>
                    <span style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,fontFamily:"monospace",color:helocOrigination+helocAnnual>0?C.amber:C.textDim}}>{helocOrigination+helocAnnual===0?"$0 — tap to edit":`${fmt(helocOrigination)} + ${fmt(helocAnnual)}/yr`}</span>
                      <span style={{color:C.textDim,fontSize:14,fontFamily:"monospace",transform:showHelocFees?"rotate(0)":"rotate(-90deg)",transition:"transform 0.2s",display:"inline-block"}}>▾</span>
                    </span>
                  </button>
                  {showHelocFees&&(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <NumInput label="Origination / Closing" value={helocOrigination} onChange={setHelocOrigination} tip="One-time fee. $0–$500+ typically. Many credit unions waive entirely."/>
                      <NumInput label="Annual Fee" value={helocAnnual} onChange={setHelocAnnual} tip="Yearly fee to keep the line open. $0–$100 typically."/>
                    </div>
                  )}
                </div>
              </Accordion>

              {/* ── INCOME ── */}
              <Accordion id="income" title="💰 Monthly Income" summary={incomeSummary}>
                <div style={{fontSize:11,color:C.textDim,marginBottom:14,lineHeight:1.5}}>After-tax take-home only. This is what flows into the HELOC on paydays — being accurate here is critical.</div>
                <ExpenseRow label="Primary income (salary / wages)" value={primaryIncome} onChange={setPrimaryIncome} tip="Your main job's monthly take-home after all taxes and deductions."/>
                <ExpenseRow label="Secondary income (spouse / partner)" value={secondaryIncome} onChange={setSecondaryIncome} tip="Second earner's take-home. Zero if single income."/>
                <ExpenseRow label="Other (rental, side, etc.)" value={otherIncome} onChange={setOtherIncome} tip="Rental income, freelance, business distributions. Only reliably recurring amounts."/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,padding:"10px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
                  <span style={{fontSize:11,color:C.textMid,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.06em"}}>Total Monthly Income</span>
                  <span style={{fontSize:17,fontFamily:"monospace",fontWeight:700,color:C.green}}>{fmt(monthlyIncome)}</span>
                </div>
              </Accordion>

              {/* ── EXPENSES ── */}
              <Accordion id="expenses" title="📋 Monthly Expenses" summary={expenseSummary}>
                <div style={{fontSize:11,color:C.textDim,marginBottom:14,lineHeight:1.5}}>Exclude your mortgage. The #1 reason velocity banking fails is an overestimated surplus — use your last 3 months of statements.</div>
                <div style={{display:"flex",background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,overflow:"hidden",marginBottom:14}}>
                  {[["simple","One total"],["detailed","By category"]].map(([v,lbl])=>(
                    <button key={v} onClick={()=>setExpenseMode(v)} style={{flex:1,padding:"8px 0",background:expenseMode===v?C.accent:"transparent",color:expenseMode===v?C.bg:C.textMid,border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:11,fontWeight:expenseMode===v?700:400,transition:"all 0.15s"}}>{lbl}</button>
                  ))}
                </div>
                {expenseMode==="simple"?(
                  <div>
                    <ExpenseRow label="Total monthly expenses (excl. mortgage)" value={totalExpensesSimple} onChange={setTotalExpensesSimple} tip="Everything except your mortgage — debt payments, food, utilities, transport, subscriptions, etc."/>
                    <div style={{fontSize:10,color:C.textDim,marginTop:4,lineHeight:1.6}}>Switch to "By category" to make sure nothing is forgotten.</div>
                  </div>
                ):(
                  <div>
                    {expenseGroups.map((group,gi)=>{
                      const groupTotal=group.rows.reduce((s,r)=>s+r.value,0);
                      const isOpen=!!openGroups[group.label];
                      return(
                        <div key={gi} style={{marginBottom:8,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
                          <button onClick={()=>toggleGroup(group.label)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
                            <div style={{width:3,height:14,background:group.color,borderRadius:2,flexShrink:0}}/>
                            <span style={{fontSize:11,color:group.color,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,flex:1}}>{group.label}</span>
                            {group.tip&&<InfoTip text={group.tip}/>}
                            <span style={{fontSize:12,fontFamily:"monospace",color:groupTotal>0?C.textMid:C.textDim,marginRight:8}}>{fmt(groupTotal)}</span>
                            <span style={{fontSize:14,color:C.textDim,fontFamily:"monospace",transform:isOpen?"rotate(0)":"rotate(-90deg)",transition:"transform 0.2s",display:"inline-block"}}>▾</span>
                          </button>
                          {isOpen&&(
                            <div style={{padding:"4px 12px 12px",borderTop:`1px solid ${C.border}`}}>
                              {group.rows.map((row,ri)=>(
                                <ExpenseRow key={ri} label={row.label} value={row.value} onChange={row.set} tip={row.tip}/>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12,marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,color:C.textMid,fontFamily:"monospace"}}>Total non-mortgage expenses</span>
                  <span style={{fontSize:14,fontFamily:"monospace",fontWeight:700,color:C.amber}}>{fmt(livingExpenses)}</span>
                </div>
              </Accordion>

              {/* ── STARTING CAPITAL ── */}
              <Accordion id="savings" title="🏦 Starting Capital" summary={savings>0?fmt(savings):null}>
                <NumInput label="Savings to Deploy Day 1" value={savings} onChange={setSavings} tip="Cash you'll deposit into the HELOC when you open it. Every dollar reduces your starting balance and early interest. It stays accessible — you're not spending it."/>
              </Accordion>

              </>);
            })()}

          </div>{/* end left panel */}

          {/* ── RIGHT PANEL ── */}
          <div>

            {/* SURPLUS SUMMARY */}
            {(()=>{
              const ready=mortgageBal>0&&monthlyIncome>0&&surplus>0&&result;
              return(
              <div style={{background:surplus>0?C.greenDim:C.redDim,border:`1px solid ${surplus>0?C.green+"44":C.red+"44"}`,borderRadius:12,padding:18}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:10,color:surplus>0?C.green:C.red,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Monthly Surplus</div>
                    <div style={{fontSize:11,color:C.textDim,lineHeight:1.5}}>This is how fast your HELOC balance drops each month. Higher = faster payoff.</div>
                  </div>
                  <div style={{fontSize:32,fontFamily:"monospace",fontWeight:800,color:surplus>0?C.green:C.red}}>{fmt(surplus)}</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:11,fontFamily:"monospace",marginBottom:12}}>
                  <div style={{background:"rgba(0,0,0,0.2)",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{color:C.textDim,marginBottom:2}}>Total income</div>
                    <div style={{color:C.green,fontWeight:700}}>{fmt(monthlyIncome)}</div>
                  </div>
                  <div style={{background:"rgba(0,0,0,0.2)",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{color:C.textDim,marginBottom:2}}>Total outflow</div>
                    <div style={{color:C.amber,fontWeight:700}}>{fmt(totalMonthlyOut)}</div>
                  </div>
                </div>
                {surplus<=500&&surplus>0&&<div style={{marginTop:0,marginBottom:10,fontSize:11,color:C.amber,lineHeight:1.5}}>⚠ Surplus under $500/month. The strategy works but payoff cycles will be long. Consider reducing discretionary expenses first.</div>}
                {surplus<=0&&<div style={{marginTop:0,marginBottom:10,fontSize:11,color:C.red,lineHeight:1.5}}>⚠ Negative surplus. Velocity banking requires positive monthly cash flow. Adjust income or expenses above until this number is positive.</div>}
                <button
                  onClick={()=>ready&&setActiveSection("results")}
                  style={{width:"100%",padding:"13px 0",borderRadius:9,border:"none",cursor:ready?"pointer":"default",fontFamily:"monospace",fontSize:13,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",transition:"all 0.2s",
                    background:ready?"#00c853":"#1e3a5f",
                    color:ready?"#001a0a":C.textDim,
                    boxShadow:ready?"0 0 18px rgba(0,200,83,0.35)":"none",
                    opacity:ready?1:0.5
                  }}
                >{ready?"📊 See Results →":"Fill in your numbers above first"}</button>
              </div>
              );
            })()}

          </div>{/* end right panel */}
          </div>{/* end 2-col grid */}
        </div>}

        {/* ── RESULTS TAB ── */}
        {activeSection==="results"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <button onClick={()=>setActiveSection("calculator")} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 14px",cursor:"pointer",fontFamily:"monospace",fontSize:11,color:C.textMid,letterSpacing:"0.05em"}}>← Edit Numbers</button>
            <div style={{fontSize:11,color:C.textDim,fontFamily:"monospace"}}>Adjust the <span style={{color:C.accent,cursor:"pointer"}} onClick={()=>setActiveSection("calculator")}>calculator</span> and come back any time</div>
          </div>
          {/* ── TOP ROW: Verdict + Strategy Settings side by side ── */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16,alignItems:"start"}}>
            {/* Verdict — BIG signal light */}
            <div style={{background:`linear-gradient(135deg,${vc.color}18,${vc.color}08)`,border:`2px solid ${vc.color}66`,borderRadius:12,padding:"22px 24px",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:-30,right:-30,width:140,height:140,borderRadius:"50%",background:vc.color+"12",pointerEvents:"none"}}/>
              <div style={{display:"flex",alignItems:"flex-start",gap:16}}>
                <div style={{width:64,height:64,borderRadius:12,background:vc.color+"25",border:`2px solid ${vc.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,flexShrink:0}}>{vc.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:vc.color,fontFamily:"monospace",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:4}}>// Velocity Banking Analysis</div>
                  <div style={{fontSize:22,fontWeight:800,color:vc.color,marginBottom:6,letterSpacing:"-0.01em"}}>{vc.label}</div>
                  <div style={{fontSize:14,color:C.textMid,lineHeight:1.65,marginBottom:result?12:0}}>{vc.sub}</div>
                  {result&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div style={{background:"rgba(0,0,0,0.25)",borderRadius:8,padding:"10px 14px"}}>
                      <div style={{fontSize:10,color:C.textDim,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Interest Eliminated</div>
                      <div style={{fontSize:20,fontFamily:"monospace",fontWeight:800,color:C.green}}>{fmt(result.interestSavedVsBaseline)}</div>
                      <div style={{fontSize:11,color:C.textDim,marginTop:2}}>vs standard amortization</div>
                    </div>
                    <div style={{background:"rgba(0,0,0,0.25)",borderRadius:8,padding:"10px 14px"}}>
                      <div style={{fontSize:10,color:C.textDim,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Years Cut</div>
                      <div style={{fontSize:20,fontFamily:"monospace",fontWeight:800,color:vc.color}}>{mo(result.baseline.months - result.months)}</div>
                      <div style={{fontSize:11,color:C.textDim,marginTop:2}}>{mo(result.months)} vs {mo(result.baseline.months)}</div>
                    </div>
                  </div>}
                </div>
              </div>
            </div>
            {/* Strategy Settings */}
            {result?<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px"}}>
              <div style={{fontSize:10,color:C.accent,fontFamily:"monospace",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>// Chunk Size Per Cycle <InfoTip text="Controls how much equity you draw onto the mortgage each cycle. 25% is the sweet spot for most — keeps HELOC balances small so average daily balance stays low. At low mortgage rates (3–4%), go lower (10–15%). At 6%+, you can go higher."/></div>
              <SliderInput label="Equity Drawn Per Cycle (Chunk Size)" value={redrawPct} min={0.10} max={1.0} step={0.05} onChange={setRedrawPct} format={v=>Math.round(v*100)+"%"} tip="Chunking — what % of available HELOC ceiling gets applied to the mortgage each cycle. Lower % = smaller HELOC balance = less daily interest. The sweet spot is usually 25%."/>
              <StrategyExplainer redrawPct={redrawPct} surplus={surplus} result={result}/>
            </div>:<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:24,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:C.textDim,fontFamily:"monospace",fontSize:12}}>Enter your numbers in the Calculator tab to see results</span></div>}
          </div>

            {result&&<>
              {/* Key stat cards — 6 in 2 rows */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
                <Card label="Payoff Timeline" value={mo(result.months)} sub={`vs ${mo(result.baseline.months)} following standard amortization`} color={C.green}/>
                <Card label="Total Interest + Fees" value={fmt(result.total)} sub={`Mortgage: ${fmt(result.totalMInt)} · HELOC: ${fmt(result.totalHInt)}`} color={C.amber}/>
                <Card label="Interest Eliminated" value={fmt(result.interestSavedVsBaseline)} sub="vs standard amortization schedule" color={C.accent}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
                <Card label="Chunking Cycles" value={result.cycleCount} sub={`~${Math.round(result.months/result.cycleCount)} months to clear each cycle`} color={C.textMid}/>
                <Card label="HELOC Ceiling (Final)" value={fmt(result.ltvCeiling)} sub={`Initial chunk: ${fmt(result.initialDraw)} onto mortgage principal`} color={C.textMid}/>
                <Card label="vs Locking Cash in Equity" value={(result.extraCostVsDirect>0?"+":"")+fmt(result.extraCostVsDirect)} sub={result.extraCostVsDirect>0?"liquidity premium — money stays accessible":"cheaper AND keeps money accessible"} color={result.extraCostVsDirect>0?C.amber:C.green}/>
              </div>

              {/* ── FULL INTEREST COMPARISON ── */}
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px",marginBottom:16}}>
                <div style={{fontSize:10,color:C.accent,fontFamily:"monospace",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>// Total Interest — What Your Lender Earns On Your Loan</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0}}>
                  {[
                    {label:"Standard Amortization",sub:"Pay minimum — follow the schedule",total:result.baseline.totalInt,pct:100,color:C.red,note:`Over ${mo(result.baseline.months)} you pay ${fmt(result.baseline.totalInt)} in interest alone — in addition to paying back every dollar you borrowed.`},
                    {label:`Velocity Banking (${Math.round(redrawPct*100)}% chunk)`,sub:"This strategy",total:result.total,pct:Math.round(result.total/result.baseline.totalInt*100),color:C.accent,note:`Total interest + HELOC fees. Paid off in ${mo(result.months)}. You keep ${fmt(result.interestSavedVsBaseline)} that would have gone to the bank.`},
                    {label:"Direct Extra Payments",sub:"Lock surplus into equity",total:result.direct.totalInt,pct:Math.round(result.direct.totalInt/result.baseline.totalInt*100),color:C.amber,note:`Lowest total interest — but all surplus cash is locked in equity. No liquidity. Paid off in ${mo(result.direct.months)}.`},
                  ].map((s,i)=>(
                    <div key={s.label} style={{padding:"14px 18px",borderRight:i<2?`1px solid ${C.border}`:"none"}}>
                      <div style={{fontSize:11,color:s.color,fontFamily:"monospace",fontWeight:700,marginBottom:3}}>{s.label}</div>
                      <div style={{fontSize:10,color:C.textDim,marginBottom:12}}>{s.sub}</div>
                      <div style={{fontSize:26,fontFamily:"monospace",fontWeight:800,color:s.color,marginBottom:8}}>{fmt(s.total)}</div>
                      <div style={{background:C.bg,borderRadius:4,height:6,marginBottom:8,overflow:"hidden"}}>
                        <div style={{height:"100%",width:s.pct+"%",background:s.color,borderRadius:4,transition:"width 0.5s"}}/>
                      </div>
                      <div style={{fontSize:11,color:C.textDim,lineHeight:1.6}}>{s.note}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* ── BOTTOM: Payoff Story + Tables ── */}
              {/* Payoff Story strip */}
              <div style={{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px",marginBottom:16}}>
                <div style={{fontSize:10,color:C.accent,fontFamily:"monospace",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>// Your Payoff Story — The Velocity Banking Cycle</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:0}}>
                  {[
                    {step:"Day 0 — The Chunk",color:C.accent,text:`Draw ${fmt(result.initialDraw)} from HELOC → slam it onto mortgage principal. Balance drops to ${fmt(mortgageBal-result.initialDraw)}. Apply ${fmt(result.savingsApplied)} savings → HELOC starts at ${fmt(result.initialDraw-result.savingsApplied)}.`},
                    {step:"Paycheck Parking",color:C.green,text:`Direct deposit entire paycheck (${fmt(monthlyIncome)}) into HELOC on payday. Every dollar immediately reduces average daily balance. Bills go on credit card — paid from HELOC at month end.`},
                    {step:"Daily Interest",color:C.amber,text:`HELOC charges interest daily on outstanding balance only. Month 1: ~${fmt((result.initialDraw-result.savingsApplied)*(helocRate/100/12))}. Drops every month as balance declines.`},
                    {step:"Cycle Completion",color:C.accent,text:`HELOC hits $0 in ~${Math.round(result.months/result.cycleCount)} months. Draw another ${Math.round(redrawPct*100)}% chunk onto mortgage. Repeat ${result.cycleCount}× total cycles.`},
                    {step:"Mortgage Free",color:C.green,text:`Done in ${mo(result.months)} vs ${mo(result.baseline.months)} standard amortization. Eliminated ${fmt(result.interestSavedVsBaseline)} in interest. HELOC remains open.`},
                  ].map(({step,color,text},i,arr)=>(
                    <div key={step} style={{padding:"0 14px",borderRight:i<arr.length-1?`1px solid ${C.border}`:"none"}}>
                      <div style={{fontSize:9,color,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:5}}>{step}</div>
                      <div style={{fontSize:11,color:C.textMid,lineHeight:1.6}}>{text}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Tab toggle */}
              <div style={{display:"flex",gap:2,marginBottom:14,background:C.surface,padding:4,borderRadius:8,border:`1px solid ${C.border}`}}>
                {[["year-by-year","Year-by-Year"],["cycles-comparison","Cycles & Comparison"]].map(([t,l])=><Tab key={t} label={l} active={tab===t} onClick={()=>setTab(t)}/>)}
              </div>

              {/* Tab panels */}
              <div style={{overflowX:"auto"}}>

                {/* Year-by-Year */}
              <div style={{display:tab==="year-by-year"?"block":"none",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{minWidth:780}}>
                    <thead>
                      <tr style={{background:C.bg}}>
                        {["Year","Mortgage Bal","HELOC Bal","Yr Mtg Int","Yr HELOC Int","Blended Rate","Saved vs Nothing","Liquidity","Notes"].map(h=>(
                          <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:9,color:C.textDim,fontFamily:"monospace",letterSpacing:"0.04em",textTransform:"uppercase",fontWeight:400,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {result.yearData.map((y,i)=>{
                        const prevY=i>0?result.yearData[i-1]:null;
                        const note=plainEnglishRow(y,prevY,result.cycleLog);
                        const isBreakeven=y.savedVsNothing>0&&(!prevY||prevY.savedVsNothing<=0);
                        return(
                          <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":C.surfaceAlt+"22"}}>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.textMid,whiteSpace:"nowrap"}}>{y.partial?`Yr ${y.year}*`:`Year ${y.year}`}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.text,whiteSpace:"nowrap"}}>{y.mBal>0?fmt(y.mBal):<span style={{color:C.green,fontWeight:700}}>✓ PAID</span>}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.text,whiteSpace:"nowrap"}}>{fmt(y.hBal)}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.amber,whiteSpace:"nowrap"}}>{fmt(y.yrMInt)}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:y.yrHInt>y.yrMInt?C.red:C.accent,whiteSpace:"nowrap"}}>{fmt(y.yrHInt)}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.textMid,whiteSpace:"nowrap"}}>{y.blendedRate>0?y.blendedRate.toFixed(2)+"%":"—"}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:y.savedVsNothing>0?C.green:C.red,fontWeight:isBreakeven?700:400,whiteSpace:"nowrap"}}>{y.savedVsNothing>0?"+":""}{fmt(y.savedVsNothing)}{isBreakeven?" ✓":""}</td>
                            <td style={{padding:"9px 12px",fontFamily:"monospace",fontSize:12,color:C.green,whiteSpace:"nowrap"}}>{fmt(y.liquidity)}</td>
                            <td style={{padding:"9px 12px",fontSize:11,color:C.textDim,fontStyle:"italic",minWidth:160}}>{note}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{padding:"8px 14px",borderTop:`1px solid ${C.border}`,fontSize:10,color:C.textDim,fontFamily:"monospace",display:"flex",gap:16,flexWrap:"wrap"}}>
                  <span>* Partial year</span>
                  <span style={{color:C.red}}>■ HELOC Int red = exceeds mortgage int that year</span>
                  <span style={{color:C.green}}>■ Saved vs Nothing turns green at break-even</span>
                </div>
              </div>

              {/* Cycles & Comparison — side by side */}
              <div style={{display:tab==="cycles-comparison"?"grid":"none",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>

                {/* Cycles */}
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.textMid,fontFamily:"monospace"}}>{result.cycleCount} total cycle{result.cycleCount>1?"s":""} — each a lump sum onto principal</div>
                  {result.cycleLog.map((c,i)=>(
                    <div key={i} style={{padding:"14px 16px",borderBottom:i<result.cycleLog.length-1?`1px solid ${C.border}`:"none",display:"flex",gap:12,alignItems:"flex-start"}}>
                      <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,background:i===0?C.accentGlow:C.surfaceAlt,border:`2px solid ${i===0?C.accent:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace",fontSize:11,fontWeight:700,color:i===0?C.accent:C.textMid}}>{c.cycle}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,gap:6}}>
                          <span style={{fontFamily:"monospace",fontSize:12,color:C.text,flexShrink:0}}>{c.month===0?"Day 0 — Initial Draw":`Month ${c.month} — Redraw`}</span>
                          <span style={{fontFamily:"monospace",fontSize:13,color:C.accent,fontWeight:700,flexShrink:0}}>{fmt(c.draw)}</span>
                        </div>
                        <div style={{fontSize:11,color:C.textMid,lineHeight:1.6}}>
                          {c.month===0
                            ?`Mortgage → ${fmt(c.mortgageAfter)}. HELOC starts at ${fmt(c.draw-result.savingsApplied)} after ${fmt(result.savingsApplied)} savings.`
                            :`Drew ${Math.round(redrawPct*100)}% of ${fmt(c.ceiling||0)} ceiling. Mortgage → ${fmt(c.mortgageAfter)}.`}
                        </div>
                      </div>
                    </div>
                  ))}
                  <div style={{padding:"10px 16px",background:C.bg,borderTop:`1px solid ${C.border}`,fontSize:10,color:C.textMid,lineHeight:1.5}}>Each redraw eliminates principal that would have accrued interest for years.</div>
                </div>

                {/* Comparison */}
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.textMid,fontFamily:"monospace"}}>Three strategies — same income</div>
                  {[
                    {label:`Standard Amortization — No Extra Payments`,payoff:mo(result.baseline.months),mInt:result.baseline.totalInt,hInt:0,total:result.baseline.totalInt,liquidity:"Full liquidity — no equity locked up beyond normal amortization",color:C.textMid,note:"Default path — every payment follows the front-loaded amortization schedule.",highlight:false},
                    {label:`Velocity Banking (${Math.round(redrawPct*100)}% redraw)`,payoff:mo(result.months),mInt:result.totalMInt,hInt:result.totalHInt,total:result.total,liquidity:`${fmt(result.ltvCeiling)} line accessible`,color:C.accent,note:"Early payoff + savings + liquidity.",highlight:true},
                    {label:"Direct Extra Payments",payoff:mo(result.direct.months),mInt:result.direct.totalInt,hInt:0,total:result.direct.totalInt,liquidity:"$0 liquid — locked in equity",color:C.amber,note:"Lowest interest, no liquidity.",highlight:false},
                  ].map((s,i)=>(
                    <div key={i} style={{padding:"14px 16px",borderBottom:i<2?`1px solid ${C.border}`:"none",background:s.highlight?C.accentGlow:"transparent",borderLeft:`3px solid ${s.highlight?C.accent:"transparent"}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8,gap:6}}>
                        <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:s.color,lineHeight:1.3}}>{s.label}</span>
                        <span style={{fontFamily:"monospace",fontSize:14,fontWeight:700,color:C.text,flexShrink:0}}>{s.payoff}</span>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
                        {[["Mtg Int",fmt(s.mInt),C.amber],["HELOC Int",fmt(s.hInt),s.hInt>0?C.accent:C.textDim],["Total",fmt(s.total),s.color]].map(([lbl,val,col])=>(
                          <div key={lbl} style={{background:C.surfaceAlt,borderRadius:5,padding:"7px 8px"}}>
                            <div style={{fontSize:8,color:C.textDim,fontFamily:"monospace",textTransform:"uppercase",marginBottom:2}}>{lbl}</div>
                            <div style={{fontSize:12,fontFamily:"monospace",color:col,fontWeight:700}}>{val}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:10,color:C.textDim}}>{s.liquidity}</div>
                      <div style={{fontSize:10,color:C.textDim,fontStyle:"italic",marginTop:2}}>{s.note}</div>
                    </div>
                  ))}
                </div>

              </div>

              </div>{/* end tab panels */}
            </>}

            {!result&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:36,textAlign:"center"}}>
              <div style={{fontSize:44,marginBottom:14}}>🏠</div>
              <div style={{color:C.red,fontFamily:"monospace",fontSize:15,marginBottom:12,fontWeight:700}}>INSUFFICIENT EQUITY FOR A HELOC</div>
              <div style={{color:C.textMid,fontSize:13,lineHeight:1.8}}>Your mortgage balance (<strong style={{color:C.text}}>{fmt(mortgageBal)}</strong>) exceeds the {ltvLimit}% LTV ceiling (<strong style={{color:C.text}}>{fmt(homeValue*ltvLimit/100)}</strong>).<br/>You need <strong style={{color:C.amber}}>{fmt(mortgageBal-homeValue*ltvLimit/100)}</strong> more equity to qualify.<br/><br/>Try raising your home value estimate, adjusting the LTV limit, or lowering your mortgage balance to explore future scenarios.</div>
            </div>}
        </div>}
      </div>

      {/* FOOTER */}
      <div style={{maxWidth:1200,margin:"32px auto 0",padding:"20px 28px 0",borderTop:`1px solid ${C.border}`}}>
        <p style={{fontSize:10,color:C.textDim,fontFamily:"monospace",textAlign:"center",lineHeight:1.8}}>For educational purposes only. Not financial advice. Consult a licensed financial advisor and your lender before making mortgage decisions.<br/>Assumes {ltvLimit}% LTV HELOC · Income deposited 1st & 15th · CC paid day 25 · {appreciationRate}%/yr home appreciation · Exact daily interest accrual.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
